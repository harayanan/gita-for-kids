chapter: 1
verse: 44
speaker: arjuna

sanskrit: "अहो बत महत्पापं कर्तुं व्यवसिता वयम्। यद्राज्यसुखलोभेन हन्तुं स्वजनमुद्यताः॥"

transliteration: "aho bata mahatpāpaṁ kartuṁ vyavasitā vayam | yadrājyasukhalobhena hantuṁ svajanamudyatāḥ ||"

dhatu_breakdown:
  - word: "अहो बत"
    parts: ["aho (alas!)", "bata (what a pity!)"]
    meaning: "alas! what a pity! — an exclamation of grief and horror"
  - word: "महत्"
    parts: ["mahat (great, from mah — to be great)"]
    meaning: "great, terrible"
  - word: "पापम्"
    parts: ["pāpa (sin, evil)"]
    meaning: "sin"
  - word: "कर्तुम्"
    parts: ["kṛ (to do, to make)"]
    meaning: "to commit, to perform"
  - word: "व्यवसिताः"
    parts: ["vi (apart)", "ava (down)", "sthā (to stand, to resolve)"]
    meaning: "resolved, determined"
  - word: "वयम्"
    parts: ["vayam (we)"]
    meaning: "we"
  - word: "राज्यसुखलोभेन"
    parts: ["rājya (kingdom)", "sukha (pleasure, happiness)", "lobha (greed, from lubh — to desire)"]
    meaning: "out of greed for the pleasures of a kingdom"
  - word: "हन्तुम्"
    parts: ["han (to kill, to strike)"]
    meaning: "to kill"
  - word: "स्वजनम्"
    parts: ["sva (own)", "jana (people)"]
    meaning: "our own people, our kinsmen"
  - word: "उद्यताः"
    parts: ["ut (up)", "yam (to strive, to lift)"]
    meaning: "prepared, ready, striving"

meaning: >
  "Alas! What a great sin we have resolved to commit — that we are prepared
  to kill our own kinsmen, driven by greed for the pleasures of a kingdom!"

story:
  title: "Alas"
  source: "original"
  body: |
    The word came out of Meera before she could stop it.

    She was standing in the school corridor, outside the principal's
    office, and her best friend Jaya was inside. Jaya was inside because
    of Meera. Because of what Meera had done.

    It had started with the essay competition. The Nehru Memorial Essay
    Prize — five thousand rupees and a silver shield with your name
    engraved on it. Meera had wanted that shield since Class Six. She
    had watched older students carry it across the stage at annual day,
    and she had imagined her own name on it, the letters catching the
    light.

    Jaya had entered the same competition. Jaya, who wrote like she
    breathed — effortlessly, beautifully, the words falling into place
    as if they had been waiting for her to pick them up. In practice
    rounds, Jaya's essays made the teacher go quiet in the way that
    meant something extraordinary had happened on the page.

    Meera knew she would lose to Jaya. She knew it the way you know
    the sun will rise — not as a guess but as a fact. And knowing it
    made something twist inside her, something small and ugly that she
    did not want to look at.

    Three days before the competition, Meera found Jaya's practice
    essay in the library — a printed draft left between the pages of
    a reference book. She picked it up. She read it. It was brilliant.
    And then, without deciding to, without planning it, she slipped it
    into her bag.

    She told the librarian she had seen Jaya copying from the internet.
    She showed the printed draft as evidence — the same sentences, she
    said, that she had found on a website. The librarian called the
    teacher. The teacher called the principal. Jaya was called in.

    Now Meera stood in the corridor and listened to Jaya's voice through
    the closed door — confused, frightened, repeating "I didn't copy,
    I wrote it myself, I swear." And in that moment, with the fluorescent
    tube buzzing overhead and the smell of floor polish rising from the
    tiles, Meera saw herself clearly for the first time. Not the version
    she told herself about — the hard-working student, the deserving
    winner — but the real one. The one who had just destroyed her best
    friend for a silver shield.

    "Alas."

    That is the word that came out. Not in Hindi, not in English — it
    came out as a sound, a low groan from somewhere deep in her chest,
    the way you groan when you touch a hot stove and the burn is already
    there before you can pull your hand away.

    Arjuna's "aho bata" is that sound. It is not an argument. It is not
    philosophy. It is the raw, human cry of a person who has suddenly
    seen the size of what they are about to do. "We are resolved to
    commit a great sin" — and the most horrifying word in that sentence
    is "we." Not them. We. Arjuna includes himself. He does not point
    at Duryodhana and say "he is the greedy one." He says: we are all
    driven by greed for a kingdom, and we are all about to become
    murderers.

    The moment you see your own capacity for evil — not someone else's,
    yours — is the most terrifying and the most important moment in a
    human life. It is the moment that makes change possible. Meera
    stood in that corridor for ninety seconds. Then she opened the
    principal's door and said, "She didn't copy. I lied."

reflection: "Have you ever suddenly seen yourself doing something wrong — not in hindsight, but in the very moment? What did that feel like?"
