chapter: 1
verse: 5
speaker: sanjaya

sanskrit: "धृष्टकेतुश्चेकितानः काशिराजश्च वीर्यवान्। पुरुजित्कुन्तिभोजश्च शैब्यश्च नरपुङ्गवः॥"

transliteration: "dhṛṣṭaketuścekitānaḥ kāśirājaśca vīryavān | purujitkuntibbhojaśca śaibyaśca narapuṅgavaḥ ||"

dhatu_breakdown:
  - word: "धृष्टकेतुः"
    parts: ["dhṛṣṭa (bold)", "ketu (banner)"]
    meaning: "Dhrishtaketu — he of the bold banner"
  - word: "चेकितानः"
    parts: ["cekitāna (a warrior's name)"]
    meaning: "Chekitana, a Yadava warrior"
  - word: "काशिराजः"
    parts: ["kāśi (Kashi/Varanasi)", "rāja (king)"]
    meaning: "the King of Kashi"
  - word: "वीर्यवान्"
    parts: ["vīrya (valor)", "vat (possessing)"]
    meaning: "full of valor"
  - word: "पुरुजित्"
    parts: ["puru (many)", "jit (conqueror)"]
    meaning: "Purujit — conqueror of many"
  - word: "कुन्तिभोजः"
    parts: ["kunti (Queen Kunti)", "bhoja (protector)"]
    meaning: "Kuntibhoja, protector of Kunti's family"
  - word: "शैब्यः"
    parts: ["śibi (King Shibi's dynasty)"]
    meaning: "the king of the Shibis"
  - word: "नरपुङ्गवः"
    parts: ["nara (man)", "puṅgava (bull, best of)"]
    meaning: "bull among men — the finest warrior"

meaning: >
  "There are also Dhrishtaketu, Chekitana, the brave King of Kashi, Purujit,
  Kuntibhoja, and Shaibya — all great warriors, each a bull among men."

story:
  title: "What's in a Name?"
  source: "Mahabharata tradition"
  body: |
    In ancient India, a warrior's name was not just a label — it was a story.
    Parents chose names that carried the qualities they hoped their children
    would grow into.

    Dhrishtaketu means "bold banner" — a flag that never falls, even in the
    fiercest wind. Purujit means "conqueror of many." And the phrase
    "narapungava" — bull among men — was the highest compliment a warrior
    could receive.

    There's an old tradition in many Indian families: when a baby is born,
    the elders study the stars, consult scriptures, and choose a name that
    carries meaning. The idea is that every time someone calls your name,
    they are reminding you of who you can become.

    King Shibi, the ancestor of "Shaibya" in this verse, was famous for
    a story where he offered his own flesh to save a pigeon from a hawk.
    When Duryodhana says "Shaibya," he's not just naming a warrior — he's
    naming the entire legacy of selfless courage that stands behind him.

    Names carry weight. They carry history. They carry expectation. What
    does your name mean?

reflection: "Do you know the meaning behind your name? If not, ask your family — there might be a wonderful story waiting for you."
