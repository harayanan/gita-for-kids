chapter: 1
verse: 32
speaker: arjuna

sanskrit: "येषामर्थे काङ्क्षितं नो राज्यं भोगाः सुखानि च। त इमेऽवस्थिता युद्धे प्राणांस्त्यक्त्वा धनानि च॥"

transliteration: "yeṣāmarthe kāṅkṣitaṁ no rājyaṁ bhogāḥ sukhāni ca | ta ime'vasthitā yuddhe prāṇāṁstyaktvā dhanāni ca ||"

dhatu_breakdown:
  - word: "येषाम्"
    parts: ["yad (who, which)"]
    meaning: "for whose sake"
  - word: "अर्थे"
    parts: ["artha (purpose, sake, meaning)"]
    meaning: "for the purpose of"
  - word: "काङ्क्षितम्"
    parts: ["kāṅkṣ (to desire)"]
    meaning: "is desired"
  - word: "राज्यम्"
    parts: ["rāj (to rule)"]
    meaning: "kingdom"
  - word: "भोगाः"
    parts: ["bhuj (to enjoy)"]
    meaning: "enjoyments"
  - word: "सुखानि"
    parts: ["sukha (happiness)"]
    meaning: "pleasures"
  - word: "ते इमे"
    parts: ["tad (those)", "idam (these)"]
    meaning: "those very people, these here"
  - word: "अवस्थिताः"
    parts: ["ava (down)", "sthā (to stand)"]
    meaning: "standing, arrayed"
  - word: "युद्धे"
    parts: ["yudh (to fight)"]
    meaning: "in battle"
  - word: "प्राणान्"
    parts: ["pra (forth)", "an (to breathe)"]
    meaning: "lives, life-breath"
  - word: "त्यक्त्वा"
    parts: ["tyaj (to abandon, to give up)"]
    meaning: "having given up, having renounced"
  - word: "धनानि"
    parts: ["dhana (wealth)"]
    meaning: "wealth, riches"

meaning: >
  "Those for whose sake we desire kingdom, enjoyments, and pleasures —
  they stand here in battle, having given up their lives and wealth."

story:
  title: "The Birthday Party with No One Left"
  source: "original"
  body: |
    Ravi planned his birthday party for three months.

    It was going to be the best one he had ever thrown — not the usual
    cake-and-cold-drink affair in the living room with plastic plates and
    a Bollywood playlist. No. This year Ravi was turning thirteen, and
    his father had rented the community hall on the ground floor of their
    apartment complex in Borivali, the one with the high ceiling and the
    marble floor that echoed when you walked across it in shoes. There
    would be a DJ. There would be a photo booth with silly props — fake
    moustaches and oversized sunglasses and cardboard speech bubbles that
    said things like "Birthday Boy's Best Friend." There would be a
    butter chicken counter and a chaat station and a chocolate fountain
    that his mother had borrowed from Mrs. Kapoor in C-wing.

    All of it — every single arrangement — was for them. His friends.
    Kabir, who could make anyone laugh. Priya, who always remembered
    everyone's favourite song. Ankit and Sonal and little Farah from the
    fourth floor who followed the older kids around like a loyal puppy.
    They were the reason for the party. Without them, the DJ was just a
    man playing music to an empty room.

    Then came the fight.

    It started over something small — a cricket match on the building
    terrace, a disputed run-out, words that got louder and sharper until
    they were no longer about cricket at all. Kabir said something about
    Ankit's father. Ankit shoved Kabir. Priya tried to step between them
    and got yelled at by both sides. Within three days, the friend group
    that had been inseparable since the fifth standard had fractured into
    camps. Kabir's side. Ankit's side. And Ravi, standing in the middle,
    watching the people he loved most turn into strangers.

    The night before the party, Ravi sat in the decorated hall alone. The
    DJ had done a sound check that afternoon. The photo booth was set up,
    the cardboard props leaning against the wall. The chocolate fountain
    sat on the corner table, unplugged, waiting. He looked at the rows
    of chairs and imagined them filled — and then imagined them empty.

    Six of his twelve invited friends had said they would not come if the
    other six were there.

    Ravi looked at the speech bubble that read "Birthday Boy's Best
    Friend" and set it face-down on the table.

    This is what Arjuna sees on the battlefield. Everything he has ever
    fought for — the kingdom, the wealth, the pleasures of victory —
    was never for himself. It was for them. For his teachers, his uncles,
    his cousins, his grandfathers. They were the reason. And now those
    very people stand across from him in armour, ready to die. The prize
    and the people he wanted to share it with have become the same thing
    he must destroy to claim it. It is the cruelest irony in the world:
    the party is ready, but the guests are the enemy.

    But the empty hall was not the end of Ravi's story. It was the
    moment he understood, clearly and completely, what a birthday party
    was actually for — and it was never the DJ or the chocolate fountain.
    The next morning, he left the decorations up, called each friend
    one by one, and said the same thing: "I don't care whose side you
    are on. I just want you there." Not all of them came. But some did.
    And the bridges between the rest were not burned, only strained —
    and strained things, given enough time and enough stubborn love,
    can hold weight again.

reflection: "Have you ever worked hard to build something special for the people you love, only to realize those people might not be there to enjoy it? How did that feel?"
