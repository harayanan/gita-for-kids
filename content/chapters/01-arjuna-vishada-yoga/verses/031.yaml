chapter: 1
verse: 31
speaker: arjuna

sanskrit: "न काङ्क्षे विजयं कृष्ण न च राज्यं सुखानि च। किं नो राज्येन गोविन्द किं भोगैर्जीवितेन वा॥"

transliteration: "na kāṅkṣe vijayaṁ kṛṣṇa na ca rājyaṁ sukhāni ca | kiṁ no rājyena govinda kiṁ bhogairjīvitena vā ||"

dhatu_breakdown:
  - word: "न"
    parts: ["na (not)"]
    meaning: "not"
  - word: "काङ्क्षे"
    parts: ["kāṅkṣ (to desire, to long for)"]
    meaning: "I desire"
  - word: "विजयम्"
    parts: ["vi (special)", "ji (to conquer)"]
    meaning: "victory"
  - word: "राज्यम्"
    parts: ["rāj (to rule)", "ya (that which)"]
    meaning: "kingdom, sovereignty"
  - word: "सुखानि"
    parts: ["sukha (pleasure, happiness)"]
    meaning: "pleasures, happinesses"
  - word: "किम्"
    parts: ["kim (what)"]
    meaning: "what use, what good"
  - word: "भोगैः"
    parts: ["bhuj (to enjoy)", "a (that which)"]
    meaning: "by enjoyments, through pleasures"
  - word: "जीवितेन"
    parts: ["jīv (to live)", "ita (state of)"]
    meaning: "by life, through living"
  - word: "गोविन्द"
    parts: ["go (cows, senses)", "vinda (protector)"]
    meaning: "O Govinda — Krishna, protector of cows and senses"

meaning: >
  "I do not desire victory, O Krishna, nor kingdom, nor pleasures. Of what
  use is a kingdom to us, O Govinda? Of what use are enjoyments, or even
  life itself?"

story:
  title: "The Trophy That Meant Nothing"
  source: "original"
  body: |
    Meera won the chess tournament on a Saturday afternoon in November.

    The auditorium of Kendriya Vidyalaya smelled of floor polish and
    phenyl, the way school buildings always do on weekends when the
    cleaners have been through but the students have not yet returned to
    fill the corridors with noise and sweat and tiffin-box smells. Forty
    boards had been set up in rows across the hall, and for six hours
    Meera had moved through them like a quiet storm — advancing pawns,
    sacrificing bishops, cornering kings — until only two players
    remained. Her and Samar.

    Samar, who had taught her to play in the third standard.

    They had learned together on his grandfather's wooden board, the one
    with the cracked black square in the corner where a cup of chai had
    been set down years ago. Every afternoon for two years they had sat
    cross-legged on the floor of Samar's tiny flat in Mayur Vihar, the
    ceiling fan clicking above them, his dadi bringing them glucose
    biscuits and buttermilk, while they played game after game after game.
    Samar taught her the Sicilian Defence. She taught him the Queen's
    Gambit. They were not just partners. They were the only two people in
    the world who understood why a perfectly timed knight fork could make
    your heart sing.

    Then came the tournament. Same school. Same hall. Opposite sides of
    the board.

    Meera saw the trap Samar was building — a beautiful rook sacrifice
    leading to a back-rank mate in four moves. It was the kind of play
    they had designed together, late at night over phone calls, notebooks
    open, arrows drawn in coloured pencil. She knew it because it was
    half hers. And because she knew it, she dismantled it. Piece by
    piece. She watched his face change — the flash of surprise, the slow
    drain of hope, the tight jaw of someone trying very hard not to cry
    in front of two hundred people.

    She played her queen to f7. Checkmate.

    The hall erupted. People clapped. The chief guest shook her hand and
    placed a gold-painted trophy in her arms. Cameras flashed. Her
    parents beamed from the second row.

    Meera felt nothing.

    No — that is not quite right. She felt something, but it was not
    victory. It was the cold hollow feeling of holding a prize that had
    cost something it should never have cost. Because as the crowd pressed
    around her, she looked across the hall and saw Samar packing up his
    board alone, sliding the pieces into a velvet pouch, not looking up.
    And she knew, with a certainty that sat like a stone in her stomach,
    that he would not call tonight. He would not call tomorrow. He might
    not call for a very long time.

    She had won the game. She had lost the person who made the game
    worth playing.

    "What is a kingdom to us, Govinda? What are enjoyments, or even life
    itself?" Arjuna is not being dramatic. He is seeing a truth that most
    people only understand after it is too late: that victory means nothing
    if the people you wanted to share it with are gone. A trophy is just
    metal and paint. A kingdom is just land and buildings. The thing that
    gives them meaning — the people, the relationships, the shared
    laughter and shared struggle — if that is destroyed, then what
    exactly have you won?

reflection: "Have you ever achieved something you really wanted, only to realize it did not feel the way you expected? What was missing?"
