chapter: 1
verse: 35
speaker: arjuna

sanskrit: "निहत्य धार्तराष्ट्रान्नः का प्रीतिः स्याज्जनार्दन। पापमेवाश्रयेदस्मान्हत्वैतानाततायिनः॥"

transliteration: "nihatya dhārtarāṣṭrānnaḥ kā prītiḥ syājjanārdana | pāpamevāśrayedasmānhatvaitānātatāyinaḥ ||"

dhatu_breakdown:
  - word: "निहत्य"
    parts: ["ni (down)", "han (to kill)"]
    meaning: "having killed, by killing"
  - word: "धार्तराष्ट्रान्"
    parts: ["dhṛtarāṣṭra (Dhritarashtra)", "a (sons of)"]
    meaning: "the sons of Dhritarashtra"
  - word: "का"
    parts: ["kim (what)"]
    meaning: "what"
  - word: "प्रीतिः"
    parts: ["prī (to please, to love)"]
    meaning: "pleasure, joy, delight"
  - word: "स्यात्"
    parts: ["as (to be)"]
    meaning: "would there be, could there be"
  - word: "जनार्दन"
    parts: ["jana (people)", "ardana (one who is approached)"]
    meaning: "O Janardana — Krishna, one who is worshipped by all"
  - word: "पापम्"
    parts: ["pāpa (sin, evil)"]
    meaning: "sin"
  - word: "एव"
    parts: ["eva (only, certainly)"]
    meaning: "only, certainly"
  - word: "आश्रयेत्"
    parts: ["ā (towards)", "śri (to take refuge)"]
    meaning: "would take shelter in, would cling to"
  - word: "आततायिनः"
    parts: ["ātatāyin (aggressor, one who attacks)"]
    meaning: "aggressors, those who attack"

meaning: >
  "What pleasure can there be for us after killing the sons of
  Dhritarashtra, O Janardana? Only sin would come to us from slaying
  these aggressors."

story:
  title: "The Match That Nobody Won"
  source: "original"
  body: |
    The kabaddi final between Class 7A and 7B was supposed to be the
    highlight of the sports day at Navodaya Vidyalaya.

    It was not.

    It began well enough. The two teams lined up on opposite sides of
    the mud court, barefoot, crouched, breathing hard. The referee blew
    the whistle. Tarun, the best raider in 7A, crossed the centre line,
    chanting "kabaddi, kabaddi, kabaddi" in one continuous breath, his
    hand darting out to tag Suresh from 7B. It was fast. It was skilful.
    The crowd cheered. This was sport.

    Then something changed. Nobody could say exactly when it happened —
    somewhere around the third raid, when Suresh tackled Tarun too hard
    and Tarun's chin hit the ground and came up bleeding. It might have
    been an accident. Suresh was strong and the mud was slippery and
    bodies move in ways you cannot always control. But Tarun got up with
    a look on his face that was no longer about kabaddi.

    On the next raid, Tarun went for Suresh with his elbows out. The
    tag was legal but the force was not. Suresh went down, and his
    shoulder made a sound like a green branch bending too far. The
    referee blew the whistle. Warning. But the damage was done. Now both
    sides were playing not to win, but to hurt.

    Knees aimed at ribs. Fingers twisted backward during tackles. Mud
    kicked into eyes. The chanting of "kabaddi" became a war cry. The
    crowd, which had been cheering, fell quiet. Teachers stood up from
    their chairs. The PE sir ran to the edge of the court, whistle
    screaming, but neither team was listening anymore.

    When the final whistle blew, 7A had won. Tarun's team. They stood
    on the mud court with the score in their favour and the trophy
    waiting on the principal's table. But Tarun was not looking at the
    trophy. He was looking at Suresh, who sat on the ground holding his
    shoulder, his face white and tight with pain. Two of Suresh's
    teammates were limping. One had a swollen eye. On Tarun's own side,
    three boys were bleeding.

    The principal handed the trophy to the team captain. There was no
    applause. The crowd drifted away in silence. That evening, Tarun
    sat on the hostel steps with the trophy between his feet and
    stared at it for a long time. The metal gleamed under the corridor
    light. His chin still throbbed where it had hit the ground.

    "We won," his teammate Javed said from behind him.

    "Did we?" Tarun said.

    He could not explain the feeling. The score said victory. The trophy
    said victory. But something inside him — something in the hollow of
    his chest where pride should have been — said something else entirely.
    It said: you crossed a line. You hurt people to get here. And no
    amount of winning can undo what was broken on that court today.

    Arjuna calls his enemies "ātatāyins" — aggressors, people who
    attacked first. By the rules of dharma, a warrior has every right
    to slay an aggressor. But Arjuna sees past the rules. Even when the
    killing is justified, the sin still clings. Victory built on
    destruction does not taste like victory. It tastes like mud and blood.

reflection: "Have you ever won something but felt wrong about how you won it? What did that feeling teach you about the difference between winning and being right?"
