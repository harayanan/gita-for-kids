summary: >
  Arjuna is still sad and confused, so Krishna begins to teach him. Krishna
  explains that the soul never dies — it simply moves from one body to another,
  like changing old clothes for new ones. He tells Arjuna to do his duty without
  worrying about winning or losing. This is the chapter where Krishna's great
  teaching truly begins.
