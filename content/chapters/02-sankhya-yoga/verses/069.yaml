chapter: 2
verse: 69
speaker: krishna

sanskrit: "या निशा सर्वभूतानां तस्यां जागर्ति संयमी। यस्यां जाग्रति भूतानि सा निशा पश्यतो मुनेः॥"

transliteration: "yā niśā sarvabhūtānāṁ tasyāṁ jāgarti saṁyamī | yasyāṁ jāgrati bhūtāni sā niśā paśyato muneḥ ||"

dhatu_breakdown:
  - word: "निशा"
    parts: ["niś (night)"]
    meaning: "night, darkness"
  - word: "सर्वभूतानाम्"
    parts: ["sarva (all)", "bhū (to become, to exist)"]
    meaning: "of all beings, of all creatures"
  - word: "जागर्ति"
    parts: ["jāgṛ (to be awake, to be watchful)"]
    meaning: "is awake, is watchful"
  - word: "संयमी"
    parts: ["sam (together)", "yam (to restrain)"]
    meaning: "the self-disciplined one, the one with mastery"
  - word: "भूतानि"
    parts: ["bhū (to become, to be)"]
    meaning: "all beings, creatures"
  - word: "पश्यतः"
    parts: ["paś (to see, to behold)"]
    meaning: "of the one who sees, of the seer"
  - word: "मुनेः"
    parts: ["man (to think, to reflect)"]
    meaning: "of the sage, the silent thinker"

meaning: >
  What is night to all beings, the disciplined one is awake in that. What
  all beings are awake in, that is night to the seeing sage.

story:
  title: "The Lamplight Painter"
  source: "original"
  body: |
    Nandu woke to a sound he could not name.

    Not a loud sound — a soft scraping that came and went in rhythm. The
    house was dark. Through the window, the village was darker still — no
    streetlights, just the enormous canopy of stars and a half-moon
    tangled in the neem tree.

    He followed the sound down the corridor, feet cold on the stone
    floor, to the small back room that Baa used as her painting studio.

    A single oil lamp burned on the table. Baa sat on the floor with a
    large sheet of handmade paper before her, painting fish — dozens of
    tiny fish in the Gond style, each one filled with delicate patterns,
    swimming in a river that curved across the paper like a story.

    "Baa?" Nandu whispered. "It's the middle of the night."

    She looked up, unsurprised. The lamplight made her face look like
    one of her own paintings — warm, patient, lined with years of
    attention.

    "Everyone is sleeping," Nandu said.

    Baa dipped her brush into a clay pot of black ink, and with a single
    stroke drew a fish so alive it seemed to flick its tail. "Everyone
    is sleeping through their lives, too," she said gently. "Not just
    now. Most days. Most years."

    Nandu sat down cross-legged beside her. He did not fully understand,
    but something in her voice made him want to be near the words even
    if he could not yet hold their meaning.

    "What do you see at night that you can't see during the day?"

    She set the brush down. The oil lamp flickered. A moth circled it,
    throwing a shadow the size of a bird across the ceiling.

    "During the day," she said, "the world is very loud. Everyone is
    chasing things — money, praise, pleasure, the next worry. That is
    the day most people are awake in. But underneath all that noise,
    there is something quieter. Something that does not chase and does
    not need. It is shy — like the stars, Nandu. The stars are there
    during the day too, but you cannot see them because the sun is too
    loud."

    She picked up the brush again. "At night, when the loudness sleeps,
    I can hear the quiet. And in the quiet, the painting comes. Not
    from me — through me. Like water through a pipe."

    Nandu watched her paint. Fish after fish appeared, each one carrying
    tiny worlds inside its body — suns, moons, trees, rivers, all the
    patterns of the Gond imagination. The village slept. And Baa was
    awake in a country that had no name, a country that existed right
    here in this room but that most people would walk through without
    noticing.

    He fell asleep on the studio floor, the sound of the brush his
    lullaby, and in the morning when he woke, the painting was
    finished — a hundred fish swimming through a river of stars.

reflection: "Is there something you notice that other people seem to walk right past — a sound, a color, a feeling? What would it mean to be 'awake' to things most people sleep through?"
