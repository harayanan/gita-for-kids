chapter: 2
verse: 57
speaker: krishna

sanskrit: "यः सर्वत्रानभिस्नेहस्तत्तत्प्राप्य शुभाशुभम्। नाभिनन्दति न द्वेष्टि तस्य प्रज्ञा प्रतिष्ठिता॥"

transliteration: "yaḥ sarvatrānabhisnehastattatprāpya śubhāśubham | nābhinandati na dveṣṭi tasya prajñā pratiṣṭhitā ||"

dhatu_breakdown:
  - word: "सर्वत्र"
    parts: ["sarva (all, every)"]
    meaning: "everywhere, in all circumstances"
  - word: "अनभिस्नेहः"
    parts: ["an (not)", "abhi (toward)", "snih (to be sticky, to cling)"]
    meaning: "without clinging attachment"
  - word: "शुभाशुभम्"
    parts: ["śubha (auspicious, good)", "aśubha (inauspicious, bad)"]
    meaning: "good and bad, pleasant and unpleasant"
  - word: "अभिनन्दति"
    parts: ["abhi (toward)", "nand (to rejoice)"]
    meaning: "rejoices excessively, celebrates with attachment"
  - word: "द्वेष्टि"
    parts: ["dviṣ (to hate, to be hostile)"]
    meaning: "hates, despises"
  - word: "प्रज्ञा"
    parts: ["pra (before, forth)", "jñā (to know)"]
    meaning: "wisdom, deep understanding"
  - word: "प्रतिष्ठिता"
    parts: ["prati (firmly)", "sthā (to stand)"]
    meaning: "established, firmly grounded"

meaning: >
  One without attachment everywhere, who neither rejoices excessively nor
  hates when obtaining good or evil — that one's wisdom is established.

story:
  title: "Two Sips of Tea"
  source: "original"
  body: |
    The letter from the State Art Council arrived on a Tuesday afternoon,
    tucked between the electricity bill and a pamphlet for fertilizer.

    Baa opened it at the kitchen table while Nandu watched. Her eyes moved
    across the page slowly — she read the way she painted, with patience,
    missing nothing. When she finished, she set the letter down, picked up
    her cup of chai, and took a sip.

    "What does it say?" Nandu asked.

    "My Gond painting of the river festival has won the state prize. They
    want to display it in Bhopal for three months."

    Nandu jumped up. "Baa! That's amazing! The state prize!" He was
    already imagining telling Kabir, telling his teacher, telling the
    whole village.

    Baa smiled — a real smile, warm as bread — and took another sip of
    chai. "It is nice," she said. Then she turned to the window where the
    afternoon light was doing something interesting to the mango leaves,
    and Nandu could see that in her mind, she was already composing her
    next painting.

    Two months later, a different letter arrived. This one said that Baa's
    newest painting — a large piece she had worked on for weeks, a forest
    scene with deer and moonlight that Nandu thought was the most
    beautiful thing she had ever made — had been rejected from the
    national exhibition. Not enough "contemporary relevance," the letter
    said.

    Baa read it at the same kitchen table. She set it down. She picked up
    her chai. She took a sip.

    Nandu watched her face, looking for the crack, the wince, the
    tightening around the eyes that would show the hurt. He found nothing.
    Not blankness — Baa's face was never blank. But a kind of evenness,
    like a river that flows at the same steady pace whether the banks are
    lined with flowers or with stones.

    "Doesn't it make you sad?" he asked.

    "The painting is still beautiful, Nandu. The deer are still standing
    in the moonlight. A letter cannot change that." She paused. "And the
    prize did not make the river painting more beautiful than it already
    was. A letter cannot do that either."

    Nandu sat down. He thought about this for a long time — longer than a
    ten-year-old usually thinks about anything. The prize had not changed
    the painting. The rejection had not changed the painting. The
    paintings were what they were, and Baa was who she was, and no letter
    from any council could add or subtract from either.

    Same table. Same chai. Same Baa. The world swung between good news
    and bad news, and she remained exactly where she was.

reflection: "When you get a good grade, how long does the happiness last? When you get a bad one, how long does the sadness last? What would it feel like if both lasted exactly the same — not very long at all?"
