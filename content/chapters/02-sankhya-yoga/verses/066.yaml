chapter: 2
verse: 66
speaker: krishna

sanskrit: "नास्ति बुद्धिरयुक्तस्य न चायुक्तस्य भावना। न चाभावयतः शान्तिरशान्तस्य कुतः सुखम्॥"

transliteration: "nāsti buddhirayuktasya na cāyuktasya bhāvanā | na cābhāvayataḥ śāntiraśāntasya kutaḥ sukham ||"

dhatu_breakdown:
  - word: "बुद्धिः"
    parts: ["budh (to awaken, to understand)"]
    meaning: "intellect, wisdom, discernment"
  - word: "अयुक्तस्य"
    parts: ["a (not)", "yuj (to yoke, to discipline)"]
    meaning: "of the undisciplined one, the unsteady person"
  - word: "भावना"
    parts: ["bhū (to become, to be)", "ana (continuous action)"]
    meaning: "right feeling, contemplation, meditation"
  - word: "शान्तिः"
    parts: ["śam (to be calm, to be at peace)"]
    meaning: "peace, tranquility"
  - word: "अशान्तस्य"
    parts: ["a (not)", "śam (to be calm)"]
    meaning: "of the peaceless one"
  - word: "सुखम्"
    parts: ["su (good)", "kha (space, axle-hole)"]
    meaning: "happiness, comfort, ease"

meaning: >
  There is no wisdom for the undisciplined, no meditation for the unsteady,
  no peace for the unmeditative — and for the peaceless, how can there be
  happiness?

story:
  title: "The Spinning Top"
  source: "original"
  body: |
    Nandu could not sleep.

    It was one of those nights when the mind refuses to lie down, even
    when the body is exhausted. He had been in bed for an hour, staring
    at the ceiling fan turning in the darkness, and his thoughts were
    doing the same thing — turning, turning, never stopping.

    First he thought about the cricket match he had lost that afternoon.
    Then about the math homework he had not finished. Then about whether
    Kabir was still upset about their argument at lunch. Then about his
    grandfather — the sudden sharp ache of remembering that Baba was
    gone, the way you step on a thorn you thought you had already pulled
    out. Then back to the cricket match, replaying the dropped catch in
    slow motion.

    Round and round. A carousel of worries, each one handing him off to
    the next like dancers in a circle.

    He padded out to the veranda in his bare feet. Baa was there, as he
    somehow knew she would be. She was sitting in her wooden chair,
    wrapped in her shawl, looking at nothing in particular with an
    expression of such settled calm that Nandu felt, for a moment,
    slightly annoyed. How could anyone be that peaceful when his own mind
    was a beehive?

    "Can't sleep," he said, sitting on the floor next to her chair.

    "Your mind is busy," she said. It was not a question.

    "It won't stop."

    Baa was quiet for a moment. Then she said: "Have you ever watched a
    spinning top, Nandu? A really fast one?"

    He nodded. Kabir had a metal top that could spin for almost two
    minutes.

    "When a top is spinning very fast, it looks still, doesn't it? It
    looks solid, balanced, almost calm. But try to put something on it —
    a grain of rice, a tiny leaf — and what happens?"

    "It flies off."

    "Exactly. The top cannot hold anything because it is not still — it
    only looks still. Its speed is a kind of lie." She reached down and
    put her hand on his head, warm and heavy. "A mind that is always
    spinning cannot hold wisdom, Nandu. It cannot hold peace. And without
    peace, happiness has no place to sit."

    She traced the chain with her finger in the air, as though writing on
    the darkness: "No discipline, no wisdom. No wisdom, no meditation.
    No meditation, no peace. No peace, no happiness. You see? Each one
    holds up the next, like legs on a stool. Remove any one and the whole
    thing falls."

    Nandu leaned against her chair. The veranda was cool. A frog called
    from the garden pond, a single low note repeating without urgency.
    Baa's hand rested on his head, and his thoughts, which had been
    spinning and spinning and spinning, began — not to stop, but to
    slow. Just a little. Just enough.

    He was asleep before the frog fell silent.

reflection: "When your thoughts are spinning at bedtime, what is one thing that helps you slow them down? Does it work every time, or only sometimes?"
