chapter: 2
verse: 14
speaker: krishna

sanskrit: "मात्रास्पर्शास्तु कौन्तेय शीतोष्णसुखदुःखदाः। आगमापायिनोऽनित्यास्तांस्तितिक्षस्व भारत॥"

transliteration: "mātrāsparśāstu kaunteya śītoṣṇasukhaduḥkhadāḥ | āgamāpāyino'nityāstāṁstitikṣasva bhārata ||"

dhatu_breakdown:
  - word: "मात्रास्पर्शाः"
    parts: ["mātrā (measure, sense-object)", "sparśa (touch, contact, from spṛś — to touch)"]
    meaning: "contacts of the senses with objects"
  - word: "शीतोष्ण"
    parts: ["śīta (cold)", "uṣṇa (hot)"]
    meaning: "cold and heat"
  - word: "सुखदुःखदाः"
    parts: ["sukha (pleasure)", "duḥkha (pain)", "da (giving, from dā — to give)"]
    meaning: "giving pleasure and pain"
  - word: "आगमापायिनः"
    parts: ["āgama (coming, from ā + gam — to come)", "apāyin (departing, from apa + i — to go away)"]
    meaning: "coming and going, appearing and disappearing"
  - word: "अनित्याः"
    parts: ["a (not)", "nitya (eternal, permanent)"]
    meaning: "impermanent, not everlasting"
  - word: "तितिक्षस्व"
    parts: ["tij (to endure, to bear)"]
    meaning: "endure them, bear them patiently"
  - word: "भारत"
    parts: ["bhṛ (to bear, to carry)"]
    meaning: "O descendant of Bharata — a name for Arjuna"

meaning: >
  O son of Kunti, the contact of senses with objects gives rise to cold
  and heat, pleasure and pain. They come and go, impermanent. Endure them,
  O Bharata.

story:
  title: "The Tawa and the Year"
  source: "original"
  body: |
    It happened on a Tuesday in May, when the heat sat on the village
    like a wet blanket and even the crows were quiet.

    Baa was making rotis on the big iron tawa — the one so old and
    blackened it looked like a piece of the night sky hammered flat. Nandu
    was supposed to be peeling onions at the table, but he had drifted
    over to watch the rotis puff up, the way they always did, ballooning
    with steam until they looked like little brown planets.

    He reached out to flip one. His hand brushed the rim of the tawa.

    The pain was instant, white-hot, a lightning bolt that shot from his
    fingertips up to his elbow. Nandu yelped and yanked his hand back,
    clutching his fingers to his chest, tears springing to his eyes.

    Baa turned off the stove. She took his hand gently, examined the
    red stripe across three fingers, and led him to the tap. Cool water
    ran over the burn. Nandu hissed through his teeth.

    "It hurts," he said, as though she might not have noticed.

    "Yes," Baa said. She did not panic. She did not rush for ice or
    ointment. She just held his hand under the water and waited.

    After a minute, the worst of the sting faded to a dull throb. After
    five minutes, it faded more. Baa wrapped his fingers in a wet cloth
    and sat him down.

    "Tell me," she said. "Will this hurt in a week?"

    Nandu sniffled. "Probably a little."

    "Will it hurt in a month?"

    "...Maybe not."

    "Will it hurt in a year?"

    Nandu wiped his nose with the back of his good hand. "No."

    "So the pain came," Baa said. "And the pain will go. Like the heat
    of summer — terrible now, but monsoon always follows. Like the cold
    of January — your bones ache, but Holi always comes." She re-tied
    the wet cloth, snug but not tight. "Everything your skin feels,
    everything your tongue tastes, everything your ears hear — pleasure
    and pain both — they arrive like guests. They stay for a while.
    And then they leave. Not one of them has ever stayed forever."

    She handed him a warm roti from the stack, buttered and folded.

    "The trick," Baa said, "is not to build a house for every guest."

    Nandu bit into the roti. His fingers still throbbed. But already,
    even now, the pain was a little less than it had been a minute ago.
    Already it was leaving.

reflection: "Think of a pain you felt last year that seemed unbearable at the time. Does it still hurt now? What does that tell you about pain — and about happiness too?"
