chapter: 2
verse: 40
speaker: krishna

sanskrit: "नेहाभिक्रमनाशोऽस्ति प्रत्यवायो न विद्यते। स्वल्पमप्यस्य धर्मस्य त्रायते महतो भयात्॥"

transliteration: "nehābhikramanāśo'sti pratyavāyo na vidyate | svalpamapyasya dharmasya trāyate mahato bhayāt ||"

dhatu_breakdown:
  - word: "अभिक्रम"
    parts: ["abhi (toward)", "kram (to step, to begin)"]
    meaning: "a beginning, an undertaking, effort"
  - word: "नाशः"
    parts: ["naś (to perish, to be lost)"]
    meaning: "destruction, loss, waste"
  - word: "प्रत्यवायः"
    parts: ["prati (back, against)", "ava (down)", "i (to go)"]
    meaning: "adverse result, negative consequence"
  - word: "विद्यते"
    parts: ["vid (to find, to exist)"]
    meaning: "exists, is found"
  - word: "स्वल्पम्"
    parts: ["su (very)", "alpa (small, little)"]
    meaning: "very little, even a small amount"
  - word: "धर्मस्य"
    parts: ["dhṛ (to hold, to sustain)"]
    meaning: "of this dharma, of this righteous practice"
  - word: "त्रायते"
    parts: ["trai (to protect, to save)"]
    meaning: "protects, saves, delivers"
  - word: "भयात्"
    parts: ["bhī (to fear)"]
    meaning: "from fear, from danger"

meaning: >
  In this path no effort is ever wasted, and no adverse result is
  produced. Even a little of this practice saves one from great fear.

story:
  title: "One Branch of the Tree"
  source: "original"
  body: |
    The Gond painting was spread across the veranda floor on an old
    cotton sheet, its edges held down by river stones.

    Baa had been working on it for three days — a Tree of Life in the
    Pardhan Gond style, the kind she had learned from her mother and
    her mother's mother in the villages outside Bhopal. The trunk was
    done: thick, rooted, filled with the signature dots and dashes
    that made every Gond painting look like it was breathing. Around
    it, she had begun sketching branches in light pencil, each one
    waiting to become a world of birds and fish and tiny deer.

    "Your turn," she said, handing Nandu a thin brush dipped in
    terracotta pigment.

    He stared at the painting. It was enormous. "I can't do all
    that."

    "Who asked you to do all of it?" Baa pointed to a single bare
    branch in the upper left corner. "Do that one. Just that one."

    Nandu knelt on the sheet, the concrete cool through the cotton
    against his knees. He leaned close and began — carefully, slowly
    — filling in a row of tiny dots along the branch's edge. His hand
    trembled. Two dots were too big. One was slightly off the line.
    But the branch began to take shape, gaining the texture of bark,
    the feeling of something alive.

    Then Baa called him for dinner. Dal and rice, the smell of tadka
    pulling him away from the veranda. He looked back at the painting
    from the kitchen doorway. His branch was barely started — just a
    slender limb with one row of dots and the faintest suggestion of
    leaves.

    "Is that enough?" he asked. "It's not even close to finished."

    Baa ladled dal over his rice and set the steel plate in front
    of him. "Nandu, that branch exists now. Before tonight, it did
    not. Tomorrow you will add more. Next week, the birds will come.
    But even if you never touched that painting again, the branch
    would still be there. It would still be part of the tree."

    She sat across from him and tore a piece of roti. "Every stroke
    counts. Nothing you put into something real is ever lost."

    Outside, the painting waited in the dark, one branch further
    along than it had been that morning.

reflection: "Have you ever started something and stopped because it felt too small to matter? What if that small start was already enough?"
