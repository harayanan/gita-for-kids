chapter: 2
verse: 71
speaker: krishna

sanskrit: "विहाय कामान्यः सर्वान्पुमांश्चरति निःस्पृहः। निर्ममो निरहङ्कारः स शान्तिमधिगच्छति॥"

transliteration: "vihāya kāmānyaḥ sarvānpumāṁścarati niḥspṛhaḥ | nirmamo nirahaṅkāraḥ sa śāntimadhigacchati ||"

dhatu_breakdown:
  - word: "विहाय"
    parts: ["vi (apart, away)", "hā (to leave, abandon)"]
    meaning: "having given up, having left behind"
  - word: "कामान्"
    parts: ["kam (to desire)"]
    meaning: "desires, longings"
  - word: "निःस्पृहः"
    parts: ["niḥ (without)", "spṛh (to desire eagerly, to covet)"]
    meaning: "without craving, free from longing"
  - word: "निर्ममः"
    parts: ["niḥ (without)", "mama (mine)"]
    meaning: "without 'mine-ness,' free from possessiveness"
  - word: "निरहङ्कारः"
    parts: ["niḥ (without)", "aham (I)", "kāra (maker, doer)"]
    meaning: "without ego, free from the sense of 'I am the doer'"
  - word: "शान्तिम्"
    parts: ["śam (to be at peace)"]
    meaning: "peace, deep inner tranquility"
  - word: "अधिगच्छति"
    parts: ["adhi (over, upon)", "gam (to go)"]
    meaning: "attains, arrives at"

meaning: >
  One who gives up all desires, moves without craving, without "mine-ness,"
  without ego — that one attains peace.

story:
  title: "The Lightest Room"
  source: "original"
  body: |
    Baa's painting studio needed cleaning.

    It was not dirty — Baa was too careful for that. But things had
    accumulated. Jars of pigment powder — indigo, vermillion, turmeric
    yellow — stood in crowded rows along the windowsill. Stacks of
    handmade paper leaned against the walls. Old paintings that had not
    sold at the last mela were rolled into corners. A clay pot of dried
    gum arabic had cracked and left a sticky patch on the floor.

    Nandu offered to help. He did not ask what he would get in return. He
    did not think about it. It was a Saturday morning, the light was good,
    Baa was old, and the room needed work. That was all.

    They started with the pigment jars. Nandu wiped each one with a damp
    cloth while Baa sorted them — these she still used, these had gone
    stale, these could be mixed into new colors. He swept the floor,
    working the bristles into corners where dust and dried paint flakes
    had gathered. He carried unsold paintings to the veranda to air in
    the sun. He scrubbed the sticky patch with sand and water until the
    stone was clean.

    Baa worked beside him, quiet and focused. She trusted him with her
    pigments, her brushes, her space — and he handled them with
    attention and without hurry.

    Occasionally Baa would hold up a jar and say, "This green — I made
    it the week your grandfather brought me that basket of neem leaves.
    He carried it three kilometers." She would smile, set the jar in its
    new place, and continue.

    It took the whole morning. When they were done, the studio looked
    like a different room. The pigments were organized by color — warm
    tones on the left, cool on the right. The brushes stood upright in
    clean jars. The paper was stacked neatly, the floor was bare and
    smooth, and the window, which had been half-blocked by the paint
    stacks, now let in the full morning light.

    Nandu stood in the doorway and felt something he could not quite
    name. The room was lighter — not just because the clutter was gone,
    but because something in the air had changed. He had spent a whole
    morning working and had not once thought about himself. Not about
    what he wanted, not about what was his, not about whether he was
    doing a good job or a bad job. He had just worked. And the absence
    of all that self-concern was — what? It was lightness. It was the
    feeling of a room with the window thrown open for the first time in
    months.

    "Thank you, Nandu," Baa said, standing beside him, both of them
    looking at the clean, glowing space.

    He shrugged. "It's just cleaning."

    But it was not just cleaning, and they both knew it. It was a morning
    without "I" and without "mine," and the room remembered it.

reflection: "Think of a time you helped someone without expecting anything in return. How did it feel — during the helping, not after? Did you feel lighter?"
