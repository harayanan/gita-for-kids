chapter: 2
verse: 46
speaker: krishna

sanskrit: "यावानर्थ उदपाने सर्वतः सम्प्लुतोदके। तावान्सर्वेषु वेदेषु ब्राह्मणस्य विजानतः॥"

transliteration: "yāvānartha udapāne sarvataḥ samplutodake | tāvānsarveṣu vedeṣu brāhmaṇasya vijānataḥ ||"

dhatu_breakdown:
  - word: "यावान्"
    parts: ["yāvat (as much as, to the extent)"]
    meaning: "as much, to whatever extent"
  - word: "अर्थः"
    parts: ["artha (purpose, use)"]
    meaning: "use, purpose, value"
  - word: "उदपाने"
    parts: ["ud (up)", "ap (water)", "āna (container)"]
    meaning: "in a well, a reservoir of water"
  - word: "सम्प्लुतोदके"
    parts: ["sam (completely)", "plu (to float, to flood)", "udaka (water)"]
    meaning: "when there is flooding water everywhere"
  - word: "वेदेषु"
    parts: ["vid (to know)"]
    meaning: "in all the Vedas"
  - word: "ब्राह्मणस्य"
    parts: ["bṛh (to grow, to expand)"]
    meaning: "of the knower of Brahman, the enlightened one"
  - word: "विजानतः"
    parts: ["vi (clearly, specially)", "jñā (to know)"]
    meaning: "of one who truly knows, who has realized"

meaning: >
  As useful as a small well is when there is water flooding everywhere —
  that is the value of all the Vedas to the one who has realized the
  truth.

story:
  title: "The Well in the Monsoon"
  source: "original"
  body: |
    The monsoon arrived in the third week of July, the way it always
    did in the villages near Bhopal — not gradually, but all at once,
    like someone had turned a tap in the sky.

    Nandu woke to the sound of rain hammering the tin roof so hard
    it drowned out the rooster. He pressed his face to the window
    and saw a world transformed. The red-dirt lane outside their
    house had become a shallow river, ankle-deep and moving fast,
    carrying leaves and twigs and one startled chicken. The neem
    tree in the courtyard stood with its branches bowed under the
    weight of water. The air smelled of wet earth and iron.

    "Come," Baa said from the doorway, pulling her pallu over her
    head. "Walk with me."

    They splashed down the lane in rubber chappals, Nandu's shorts
    soaked to the thigh within twenty steps. Baa led him past the
    temple, past the bus stop, past Sharma Uncle's shuttered sweet
    shop, to the edge of the village where the old stone well stood
    under a banyan tree.

    The well was a good well. In summer, when the earth baked and
    cracked and the river shrank to a brown trickle, the whole
    village came here. Women lowered brass pots on rope. Children
    waited in line with plastic buckets. The well gave what the
    sky would not.

    But today, water was everywhere. It sheeted off the banyan
    leaves. It pooled in every dip and hollow. It filled the ditches
    and overflowed the fields. The river, visible in the distance,
    had swelled to three times its summer width, brown and muscular
    and loud.

    "Nandu," Baa said, raising her voice above the rain, "would you
    lower a bucket into this well right now?"

    He looked at her, water streaming down his face. "Why would I?
    There's water everywhere."

    "Exactly." She smiled — the kind of smile that meant a lesson
    was arriving. "The well is good. The well is true. In dry
    times, you need it. But when the rain comes — when wisdom floods
    in from every direction — you do not need to lower a bucket
    anymore. You just open your mouth."

    She tilted her face to the sky and let the rain fall on her
    tongue, and Nandu laughed — a real laugh, the kind that rises
    from the belly — and did the same.

reflection: "Can you think of a tool or a method that was once very important to you but that you no longer need because you found something bigger? Did that make the tool any less valuable for the time you used it?"
