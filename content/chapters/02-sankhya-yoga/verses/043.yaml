chapter: 2
verse: 43
speaker: krishna

sanskrit: "कामात्मानः स्वर्गपरा जन्मकर्मफलप्रदाम्। क्रियाविशेषबहुलां भोगैश्वर्यगतिं प्रति॥"

transliteration: "kāmātmānaḥ svargaparā janmakarmaphalapradām | kriyāviśeṣabahulāṁ bhogaiśvaryagatiṁ prati ||"

dhatu_breakdown:
  - word: "कामात्मानः"
    parts: ["kāma (desire)", "ātman (self, soul)"]
    meaning: "those whose souls are full of desire, desire-driven"
  - word: "स्वर्गपराः"
    parts: ["svarga (heaven)", "para (highest, devoted to)"]
    meaning: "intent on heaven, obsessed with heavenly reward"
  - word: "जन्मकर्मफलप्रदाम्"
    parts: ["janma (birth, rebirth)", "karma (action)", "phala (fruit, result)", "pra-dā (to give forth)"]
    meaning: "leading to rebirth as the fruit of action"
  - word: "क्रियाविशेषबहुलाम्"
    parts: ["kriyā (rite, ritual)", "viśeṣa (special, particular)", "bahula (abundant, many)"]
    meaning: "full of elaborate special rituals"
  - word: "भोगैश्वर्यगतिम्"
    parts: ["bhoga (enjoyment, pleasure)", "aiśvarya (power, lordship)", "gati (path, destination)"]
    meaning: "the path toward pleasure and power"

meaning: >
  Full of desires, with heaven as their highest goal, they prescribe
  elaborate rituals aimed at pleasure and power — which lead only to
  rebirth.

story:
  title: "The Man Who Reached Heaven and Fell"
  source: "original"
  body: |
    Baa told Nandu a story once about a man named Somadatta.

    He was not a priest or a king. He was a rice farmer from a
    village near the Tungabhadra, a quiet man with strong hands and
    a persistent cough from the dust of his own fields. He wanted
    one thing: for his daughter to marry well. Not out of ambition
    — out of love. He wanted her safe. He wanted her fed. He wanted
    her to have a courtyard with a tulsi plant and no leaking roof.

    So Somadatta went to the temple and asked what he should do.
    The priest said: perform the new-moon fire ritual for one year.
    Somadatta sold a bullock, bought the ghee, and performed the
    ritual. His daughter married. The roof did not leak.

    But now he wanted a grandson. The priest said: the dawn chant,
    one hundred and eight repetitions for three monsoons. Somadatta
    woke before the birds, every morning, lips moving in the dark.
    The grandson came.

    Then the rains failed. Then the cough worsened. Then the
    grandson fell sick. Each time, Somadatta returned to the priest
    with another offering, another plea, and each time the priest
    had another ritual — more expensive, more elaborate, more time.
    The ladder stretched upward and Somadatta climbed it rung by
    rung, sweating and hoping.

    "And here is the part that breaks your heart," Baa said. "He
    reached heaven. When Somadatta died, his merit was real. The
    gates opened. He walked on golden floors and ate fruit that
    tasted of every good thing he had ever known."

    "So it worked," Nandu said.

    "For a while. Then his merit ran out — the way a coin purse
    empties if you only spend and never earn. And he fell. Back
    into a body. Back into a village. Back into wanting. A new
    daughter, a new roof, a new priest with new rituals. The same
    ladder. The same climb. The same heaven that was never home,
    only a visit."

    Nandu was quiet for a long time. "He never gets off."

    "Not until he stops climbing for what is at the top," Baa said,
    "and starts asking why he is on the ladder at all."

reflection: "Have you ever done something good only because you wanted a reward? How would it feel to do the same thing with no reward at all — just because it was right?"
