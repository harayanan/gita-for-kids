chapter: 2
verse: 17
speaker: krishna

sanskrit: "अविनाशि तु तद्विद्धि येन सर्वमिदं ततम्। विनाशमव्ययस्यास्य न कश्चित्कर्तुमर्हति॥"

transliteration: "avināśi tu tadviddhi yena sarvamidaṁ tatam | vināśamavyayasyāsya na kaścitkartumarhati ||"

dhatu_breakdown:
  - word: "अविनाशि"
    parts: ["a (not)", "vi (apart)", "naś (to perish, to be destroyed)"]
    meaning: "indestructible, imperishable"
  - word: "विद्धि"
    parts: ["vid (to know)"]
    meaning: "know, understand — an imperative"
  - word: "ततम्"
    parts: ["tan (to spread, to pervade)"]
    meaning: "pervaded, spread throughout"
  - word: "विनाशम्"
    parts: ["vi (apart)", "naś (to perish)"]
    meaning: "destruction"
  - word: "अव्ययस्य"
    parts: ["a (not)", "vi (apart)", "i (to go)"]
    meaning: "of the imperishable, of that which does not diminish"
  - word: "कर्तुम्"
    parts: ["kṛ (to do, to make)"]
    meaning: "to do, to bring about"
  - word: "अर्हति"
    parts: ["arh (to deserve, to be able)"]
    meaning: "is able, has the power"

meaning: >
  Know that to be indestructible by which all this is pervaded. No one
  can destroy the imperishable.

story:
  title: "The Washed Painting"
  source: "original"
  body: |
    Baa's hands were always stained.

    Not dirty — stained. There is a difference. The yellows and reds and
    deep earth-browns of her Gond paintings lived in the creases of her
    fingers, under her nails, in the lines of her palms like rivers on a
    map. She had been painting since she was younger than Nandu, learning
    the ancient patterns from her own grandmother in a village where
    every wall told a story.

    On the afternoon after the photographs, Baa took Nandu to her
    painting corner — a patch of the veranda where she kept her brushes
    in a jam jar and her pigments in small brass bowls. A piece of old
    cotton cloth was pinned to a board.

    "Watch," she said.

    She picked up a brush made from a twig of the bhelwa tree, dipped
    it in red ochre, and began to paint. A tree took shape under her
    fingers — not a photograph of a tree but a Gond tree, alive with
    pattern, every branch filled with dots and lines and tiny birds
    that seemed to vibrate with some secret energy. The trunk was thick
    and solid. The roots reached down to the bottom of the cloth like
    fingers gripping the earth.

    Nandu watched, mesmerized. It took her twenty minutes. When she
    finished, the tree was beautiful — one of the most beautiful things
    he had seen her make.

    Then Baa unpinned the cloth, carried it to the water tap beside the
    garden, and held it under the running water.

    "Baa!" Nandu shouted. "What are you doing?"

    She scrubbed gently. The red ochre ran off in rivers, swirling into
    the dust. The yellows followed, then the browns. In two minutes the
    cloth was blank again — wet, dripping, empty. Not a single line
    remained.

    Baa held up the cloth. "The paint is gone," she said. "Is the tree
    gone?"

    Nandu opened his mouth. Closed it.

    "The tree," Baa said, tapping her own forehead, "was never on the
    cloth. The cloth just held it for a while. The tree is here — in
    my hands, in my eyes, in the place where I see before I paint. I
    can put it on a hundred cloths and wash a hundred cloths and the
    tree will still be there. No water can touch it. No fire can burn
    it. No amount of washing can make it less."

    She hung the wet cloth on the line to dry.

    "Your Thatha's body was the cloth," she said quietly. "What he was —
    the real him — is the tree. And no one, Nandu, no one in all this
    world has the power to destroy it."

reflection: "Think of an idea, a memory, or a feeling that lives inside you. Could anyone take it away by force? What does that tell you about what is truly indestructible?"
