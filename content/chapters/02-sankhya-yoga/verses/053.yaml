chapter: 2
verse: 53
speaker: krishna

sanskrit: "श्रुतिविप्रतिपन्ना ते यदा स्थास्यति निश्चला। समाधावचला बुद्धिस्तदा योगमवाप्स्यसि॥"

transliteration: "śrutivipratipannā te yadā sthāsyati niścalā | samādhāvacalā buddhistadā yogamavāpsyasi ||"

dhatu_breakdown:
  - word: "श्रुतिविप्रतिपन्ना"
    parts: ["śruti (what is heard, scripture)", "vi-prati-pad (to go astray, to be confused)"]
    meaning: "bewildered by conflicting scriptures"
  - word: "स्थास्यति"
    parts: ["sthā (to stand, to remain)"]
    meaning: "shall stand, will remain firm"
  - word: "निश्चला"
    parts: ["nis (without)", "cal (to move, to waver)"]
    meaning: "unmoving, unwavering, steady"
  - word: "समाधौ"
    parts: ["sam (together, completely)", "ā (toward)", "dhā (to place, to hold)"]
    meaning: "in samadhi, in deep meditative absorption"
  - word: "अचला"
    parts: ["a (not)", "cal (to move)"]
    meaning: "immovable, rock-steady"
  - word: "बुद्धिः"
    parts: ["budh (to know, to awaken)"]
    meaning: "intellect, understanding"
  - word: "योगम्"
    parts: ["yuj (to yoke, to unite)"]
    meaning: "yoga, union, the state of divine connection"
  - word: "अवाप्स्यसि"
    parts: ["ava (down, toward)", "āp (to reach, to attain)"]
    meaning: "you shall attain, you will reach"

meaning: >
  When your intellect, now confused by conflicting scriptures, shall
  stand firm and unwavering in samadhi — then you will have attained
  yoga.

story:
  title: "Rain into Dry Earth"
  source: "original"
  body: |
    Nandu lay on his back on the cotton mattress in Baa's spare room,
    and the ceiling fan turned above him like a slow, tireless thought
    going nowhere.

    It was past ten. Baa had gone to bed an hour ago, and the house
    had settled into its nighttime language — the tick of the cooling
    roof tin, a gecko's sharp click-click from the wall behind the
    almirah, the neem tree outside dragging one branch across the
    window grille whenever the breeze pushed it. These were sounds
    Nandu had known since he was small enough to sleep between his
    parents in this same room. But tonight they could not reach him.
    His mind was somewhere else, turning and turning.

    Baa had talked to him all evening. About Thatha. About the soul.
    About how grief was not a problem to be solved but a season to be
    lived through. She had told him things that contradicted each
    other — that Thatha was gone and also not gone, that missing
    someone was right and also unnecessary, that the body mattered
    and also did not matter at all. Each thing she said made sense
    while she was saying it. But now, lying in the dark with all of
    it loose inside him, the ideas crossed and tangled and he could
    not tell which was which.

    He turned on his side. The pillow smelled like the coconut oil
    Baa pressed into her hair before sleep. A mosquito sang its thin
    song near his ear and vanished.

    He tried to sort the ideas — this one goes here, that one goes
    there, like folding clothes into piles. But they would not fold.
    They were more like water, shapeless, refusing to be held in
    two hands.

    And then — he did not decide this, it simply happened — he
    stopped trying.

    Not the giving-up kind of stopping, where you throw the book
    across the room. The other kind. The kind where you have been
    gripping something so tightly that your fingers ache, and you
    open your hand, and the thing does not fall. It stays. It was
    never going to fall. You just did not know that until you
    loosened your grip.

    The fan turned. The gecko clicked. And Nandu felt the teachings
    begin to settle — not into understanding, not yet, but into
    something deeper than understanding. The way the first monsoon
    rain does not sit on the cracked June earth but disappears into
    it, drawn down by a thirst that has been building for months.
    You cannot see where the water goes. You only know the ground
    is different afterward.

    He did not have words for what had changed. If Kabir had asked
    him the next morning — "So, do you get it now? The soul stuff?"
    — Nandu would have shrugged. But something in the shrug would
    have been different. Steadier. The way a tree is steady not
    because it is rigid but because its roots have found water.

    He slept. The neem branch scraped the grille once more and then
    the wind died and the house was still.

reflection: "When someone teaches you something important, do you feel the understanding right away — or does it sink in slowly, like rain into earth? What is one teaching that is still sinking in for you?"
