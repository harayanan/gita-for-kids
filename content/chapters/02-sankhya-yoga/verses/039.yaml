chapter: 2
verse: 39
speaker: krishna

sanskrit: "एषा तेऽभिहिता साङ्ख्ये बुद्धिर्योगे त्विमां शृणु। बुद्ध्या युक्तो यया पार्थ कर्मबन्धं प्रहास्यसि॥"

transliteration: "eṣā te'bhihitā sāṅkhye buddhiryoge tvimāṁ śṛṇu | buddhyā yukto yayā pārtha karmabandhaṁ prahāsyasi ||"

dhatu_breakdown:
  - word: "एषा"
    parts: ["etad (this)"]
    meaning: "this (referring to the wisdom just taught)"
  - word: "अभिहिता"
    parts: ["abhi (toward)", "dhā (to place, to declare)"]
    meaning: "declared, described, taught"
  - word: "साङ्ख्ये"
    parts: ["sam (together)", "khyā (to count, to reason)"]
    meaning: "in Sankhya — the path of knowledge and analysis"
  - word: "बुद्धिः"
    parts: ["budh (to know, to awaken)"]
    meaning: "wisdom, intellect, understanding"
  - word: "योगे"
    parts: ["yuj (to yoke, to unite)"]
    meaning: "in yoga — the path of disciplined action"
  - word: "कर्मबन्धम्"
    parts: ["kṛ (to do, to act)", "bandh (to bind)"]
    meaning: "the bondage of action, being trapped by deeds"
  - word: "प्रहास्यसि"
    parts: ["pra (forward, completely)", "hā (to abandon, to leave)"]
    meaning: "you shall cast off, you will completely abandon"

meaning: >
  This wisdom has been taught to you from the standpoint of Sankhya
  (knowledge). Now hear it from the standpoint of Yoga (action) —
  endowed with which understanding, O Partha, you shall cast off the
  bondage of action.

story:
  title: "The Brush in His Hand"
  source: "original"
  body: |
    Baa had been talking about pigments for twenty minutes, and Nandu
    could feel his attention floating away like a paper boat on a slow
    drain.

    They were sitting on the veranda, the late-afternoon sun turning
    the neem tree's shadow into long fingers across the concrete floor.
    Baa had laid out seven small steel bowls in a row — red earth from
    the riverbank, crushed charcoal, turmeric paste, rice flour mixed
    with water for white, sap from the palash tree — and she was
    explaining where each one came from. How the red earth had to be
    collected after the first monsoon rain, when the iron rose to the
    surface. How the charcoal was best made from neem wood because
    neem burned slower and the black it left was deeper.

    Nandu understood all of it. He could have explained it back to
    her, even drawn a diagram if she asked. The *why* of Gond
    painting — why these colors, why these materials, why this art
    mattered to the Pardhan people for hundreds of years — had sunk
    into him over weeks of listening to Baa, the way a language sinks
    in when you live inside it long enough.

    But his hands were empty. And empty hands have a restlessness
    that full ones do not.

    Baa stopped mid-sentence. She had been describing the way
    turmeric fades in direct sunlight, which is why Gond painters
    use it only for interior details. She looked at Nandu — really
    looked, the way she sometimes did when she was reading something
    behind his face that he had not yet said aloud.

    Then she reached across the row of bowls, picked up a brush made
    from goat hair tied to a twig with cotton thread, dipped it in
    the red earth, and placed it in his right hand.

    "Enough listening," she said. "Now I show you how."

    The brush was warm from the pigment. The tip was wet and heavier
    than he expected, like holding a pen that had something to say.
    His fingers closed around the twig, and his back straightened
    without him deciding to straighten it — the way your body
    rearranges itself when it knows something is about to begin.

    On the chariot at Kurukshetra, Arjuna did the same thing. For
    thirty-eight verses he had listened to Krishna explain the nature
    of the soul — what cannot be burned, what cannot be cut, why death
    is not what it seems. He had understood. But understanding had
    not unstuck his feet or lifted the bow from the chariot floor.

    Then Krishna said: "That was the wisdom of Sankhya — the path of
    knowing. Now hear the wisdom of Yoga — the path of doing. Because
    once you learn this, Partha, you will break free from the chains
    of action itself."

    Arjuna's shoulders squared. His fingers twitched. It was the
    smallest movement, but Krishna saw it — the way Baa saw it in
    Nandu — the body waking up because it had been offered something
    it could hold.

reflection: "Think about the difference between understanding why something matters and knowing how to do it. Which one do you need more right now in your life?"
