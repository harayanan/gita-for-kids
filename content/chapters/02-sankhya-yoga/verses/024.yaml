chapter: 2
verse: 24
speaker: krishna

sanskrit: "अच्छेद्योऽयमदाह्योऽयमक्लेद्योऽशोष्य एव च। नित्यः सर्वगतः स्थाणुरचलोऽयं सनातनः॥"

transliteration: "acchedyo'yamadāhyo'yamakledyo'śoṣya eva ca | nityaḥ sarvagataḥ sthāṇuracalo'yaṁ sanātanaḥ ||"

dhatu_breakdown:
  - word: "अच्छेद्यः"
    parts: ["a (not)", "chid (to cut)"]
    meaning: "unbreakable, that which cannot be cut"
  - word: "अदाह्यः"
    parts: ["a (not)", "dah (to burn)"]
    meaning: "that which cannot be burned"
  - word: "अक्लेद्यः"
    parts: ["a (not)", "klid (to become wet)"]
    meaning: "that which cannot be dissolved or wetted"
  - word: "अशोष्यः"
    parts: ["a (not)", "śuṣ (to dry)"]
    meaning: "that which cannot be dried"
  - word: "सर्वगतः"
    parts: ["sarva (all, everywhere)", "gam (to go)"]
    meaning: "all-pervading, present everywhere"
  - word: "स्थाणुः"
    parts: ["sthā (to stand)"]
    meaning: "stable, firm, immovable as a pillar"
  - word: "अचलः"
    parts: ["a (not)", "cal (to move)"]
    meaning: "immovable, unshakeable"
  - word: "सनातनः"
    parts: ["sanā (from of old, eternally)"]
    meaning: "primeval, existing from the beginning of time"

meaning: >
  This soul is unbreakable, cannot be burned, cannot be dissolved, cannot
  be dried — it is eternal, all-pervading, stable, immovable, primeval.

story:
  title: "Eight Jars"
  source: "original"
  body: |
    Baa kept her pigments in old glass jars on a shelf above the
    grinding stone.

    There were dozens — ochre and vermillion, lamp black and chalk
    white, indigo squeezed from neel leaves, a yellow made from mango
    bark that took three full days to prepare. One jar, the deep red,
    had survived the move from the village when Baa was seventeen and
    everything else in the bullock cart broke.

    Nandu sat on the floor with his knees drawn up, watching her paint.
    Today Baa was making something he had not seen before — a single
    figure, a woman standing in a river, built up layer by layer in
    different pigments.

    "What are you doing?" he asked.

    Baa dipped her brush in the first jar. A stroke of pale gold.
    "Acchedya," she said. "Unbreakable. The soul cannot be cut." She
    laid the gold down as the outline — the bones of the figure, the
    shape that held everything else.

    She reached for the red. A warm, deep stroke over the gold.
    "Adāhya. Unburnable. Fire cannot touch it." The red sat on the
    gold without hiding it, the way heat sits on stone.

    Blue next — the indigo, dark as a bruise. "Akledya. Water cannot
    dissolve it." The blue filled in the river around the figure's
    feet, and Nandu saw that the woman's outline did not bleed into
    the water. The gold held.

    White. A dry, chalky stroke across the figure's shoulders.
    "Aśoṣya. Wind cannot dry it." The white looked like dust, like
    a dry season, but beneath it the colors stayed vivid.

    Baa set down her brush. Four layers. Four things the soul was
    not. Then she picked up the brush again, and her voice changed.
    Softer. As though she were no longer listing what the soul could
    survive, but saying what it was.

    A stroke of deep green. "Nitya. Eternal."

    A wash of pale blue that spread past the figure's edges, into the
    sky, into the river, into the trees. "Sarvagata. Everywhere."

    Ochre, thick and steady, straight down the center of the figure
    like a spine. "Sthāṇu. Stable as a pillar."

    And last — the lamp black, just a single dot at the figure's heart,
    small and absolute. "Sanātana. Older than old."

    She did not paint *acala* — immovable — as a separate stroke.
    "Acala is not a color," she said, when Nandu asked. "It is what
    happens when all the other colors hold. Look."

    He looked. Eight layers, and the figure stood in the river as though
    it had always been there and the river had simply arrived around it.
    No single pigment could have done that. But together, stacked and
    set, they made something that looked — Nandu searched for the word —
    unshakeable.

    "That is what Krishna told Arjuna," Baa said, rinsing her brush.
    "Not one word, but eight. Each one holding up the next. Try to pull
    one out — go on, tell me which one you would remove."

    Nandu stared at the painting. He could not find a layer to subtract.

reflection: "Krishna uses eight words to describe the soul. If you had to pick just one — unbreakable, unburnable, eternal, all-pervading, stable, immovable, primeval, or indissoluble — which one feels the most powerful to you, and why?"
