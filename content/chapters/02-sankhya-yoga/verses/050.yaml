chapter: 2
verse: 50
speaker: krishna

sanskrit: "बुद्धियुक्तो जहातीह उभे सुकृतदुष्कृते। तस्माद्योगाय युज्यस्व योगः कर्मसु कौशलम्॥"

transliteration: "buddhiyukto jahātīha ubhe sukṛtaduṣkṛte | tasmādyogāya yujyasva yogaḥ karmasu kauśalam ||"

dhatu_breakdown:
  - word: "बुद्धियुक्तः"
    parts: ["budh (to know, to awaken)", "yuj (to yoke, to unite)"]
    meaning: "one endowed with equanimous intellect, yoked to wisdom"
  - word: "जहाति"
    parts: ["hā (to abandon, to leave)"]
    meaning: "casts off, abandons, leaves behind"
  - word: "उभे"
    parts: ["ubha (both)"]
    meaning: "both"
  - word: "सुकृतदुष्कृते"
    parts: ["su (good)", "kṛ (to do)", "dus (bad)", "kṛ (to do)"]
    meaning: "good deeds and bad deeds, merit and sin"
  - word: "योगाय"
    parts: ["yuj (to yoke, to unite)"]
    meaning: "for yoga, toward yoga"
  - word: "युज्यस्व"
    parts: ["yuj (to yoke, to unite)"]
    meaning: "strive for, devote yourself to — an imperative"
  - word: "कौशलम्"
    parts: ["kuśala (skillful, expert)"]
    meaning: "skill, dexterity, artistry"

meaning: >
  One with equanimous intellect casts off both good and bad results
  in this very life. Therefore strive for yoga — yoga is skill in
  action.

story:
  title: "The Musician Who Played for No One"
  source: "original"
  body: |
    On Saturday mornings, Nandu and Baa walked to the weekly market
    in Berasia — a kilometer of red-dirt road lined with neem trees
    whose shade made the walk bearable even in April. The market was
    loud and sprawling: vegetable sellers squatting behind pyramids
    of tomatoes and green chilies, a man sharpening knives on a
    pedal-driven wheel that sent sparks skittering across the ground,
    women selling glass bangles laid out on blue tarpaulins.

    But Nandu's favorite part was the corner near the tamarind tree,
    where the old man played the been.

    He was always there — same spot, same posture, cross-legged on
    a folded jute sack, the gourd of the been resting against his
    shoulder like a sleeping child. His fingers moved over the
    bamboo pipes with a gentleness that seemed impossible for hands
    so rough and cracked. The sound that came out was not like any
    instrument Nandu had heard on television. It was lower, older,
    with a buzz in it like the hum of bees or the vibration of a
    temple bell after it has been struck.

    There was no hat on the ground. No sign asking for money. No
    crowd gathered around him. Most people walked past without
    slowing. A few glanced, the way you glance at a tree you have
    passed a hundred times. The old man did not look up. He did not
    adjust his playing when someone stopped. He did not play louder
    when the market was noisy or softer when it was quiet. He
    simply played.

    One Saturday, Nandu stopped longer than usual. The old man was
    playing a raga Nandu did not recognize — something slow and
    winding, with notes that climbed and fell like a bird riding
    thermals over a valley. It was beautiful. Not beautiful the way
    a film song is beautiful, designed to make you feel something
    specific. Beautiful the way water is beautiful when it finds
    its own path down a hillside.

    "Baa," Nandu whispered, "why does he play if no one is
    listening?"

    Baa had been watching too. She shifted the market bag on her
    hip and said, quietly, so as not to disturb the music: "Who
    told you no one is listening?"

    Nandu looked around. The knife sharpener, the bangle women,
    the vegetable sellers — all busy with their own work.

    "He is listening," Baa said. "That is enough."

    She paused, then added: "That is yoga, Nandu. Not the sitting
    and breathing kind. The kind where you do something so well, with
    such attention, that the doing itself becomes the reason. Skill
    in action. That man is not playing for a result. He is playing
    because the music is what he is."

    The old man's fingers moved. The been hummed. The market
    continued around him like a river around a stone.

reflection: "Is there something you do where the doing itself is the reward — where you would keep doing it even if no one ever noticed?"
