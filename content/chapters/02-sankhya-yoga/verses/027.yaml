chapter: 2
verse: 27
speaker: krishna

sanskrit: "जातस्य हि ध्रुवो मृत्युर्ध्रुवं जन्म मृतस्य च। तस्मादपरिहार्येऽर्थे न त्वं शोचितुमर्हसि॥"

transliteration: "jātasya hi dhruvo mṛtyurdhruvaṁ janma mṛtasya ca | tasmādaparihārye'rthe na tvaṁ śocitumarhasi ||"

dhatu_breakdown:
  - word: "जातस्य"
    parts: ["jan (to be born)"]
    meaning: "of the one who is born"
  - word: "ध्रुवः"
    parts: ["dhru (to be firm, to be fixed)"]
    meaning: "certain, fixed, inevitable"
  - word: "मृत्युः"
    parts: ["mṛ (to die)"]
    meaning: "death"
  - word: "जन्म"
    parts: ["jan (to be born)"]
    meaning: "birth"
  - word: "मृतस्य"
    parts: ["mṛ (to die)"]
    meaning: "of the one who has died"
  - word: "अपरिहार्ये"
    parts: ["a (not)", "pari (around, fully)", "hṛ (to take, to remove)"]
    meaning: "unavoidable, that which cannot be taken away from"
  - word: "अर्थे"
    parts: ["artha (matter, thing, purpose)"]
    meaning: "in a matter, regarding a thing"
  - word: "शोचितुम्"
    parts: ["śuc (to grieve, to mourn)"]
    meaning: "to grieve, to sorrow"

meaning: >
  For the born, death is certain; for the dead, birth is certain.
  Therefore you should not grieve over what is unavoidable.

story:
  title: "Tuesday into Wednesday"
  source: "original"
  body: |
    The oil lamp in the temple alcove had burned down to a stub.

    Baa sat cross-legged on the stone floor, her white cotton sari
    pulled over her head, and watched the last quarter-inch of wick
    flicker and gutter. Nandu sat beside her, knees drawn up to his
    chin. He had not wanted to come. The temple smelled of old marigolds
    and damp sandstone, and the silence made the missing worse — Thatha
    had always been the one to bring him here on Tuesday evenings, holding
    his hand as they walked the red-dust path from the house.

    The flame leaned sideways, trembled, and went out. A thin ribbon of
    smoke curled upward and dissolved.

    Baa reached for the brass tray beside her. On it sat a fresh wick
    coiled in ghee. She placed it in the lamp, struck a match — the
    phosphorus flare sharp in the dark — and touched it to the wick.
    A new flame rose, small and steady and golden.

    "There," she said.

    Nandu stared at the flame. "It's a different fire."

    "Is it?" Baa's voice was gentle, not correcting. "Or is it fire
    continuing to be fire?"

    He didn't answer. The new flame threw the same dancing shadows on
    the same stone walls. It lit the same brass face of Hanuman in the
    alcove. It warmed the same circle of air.

    "Nandu," Baa said, "do you cry when Tuesday becomes Wednesday?"

    He looked at her, confused. "No."

    "Why not? Tuesday is gone. You will never get it back. Every Tuesday
    in your life has ended, and you have never grieved for a single one.
    Because you know Wednesday is coming. You know the week does not
    stop." She paused. "Why do you think the larger turning is any
    different?"

    A moth found the new flame and began its dizzy orbit. Nandu
    watched it circle — around and around, drawn and released, drawn
    and released.

    He thought about Thatha's lamp going out. He thought about the
    match that Baa had struck. He thought about Tuesdays and
    Wednesdays and the week that never stops turning.

    He did not feel better, exactly. But something inside him unclenched,
    the way a fist opens when it realizes there is nothing it needs to
    hold onto.

reflection: "What is something in your life that always ends and always begins again — and have you ever been afraid of the ending, even though you know the beginning is coming?"
