chapter: 2
verse: 64
speaker: krishna

sanskrit: "रागद्वेषवियुक्तैस्तु विषयानिन्द्रियैश्चरन्। आत्मवश्यैर्विधेयात्मा प्रसादमधिगच्छति॥"

transliteration: "rāgadveṣaviyuktaistu viṣayānindriyaiścaran | ātmavaśyairvidheyātmā prasādamadhigacchati ||"

dhatu_breakdown:
  - word: "रागद्वेषवियुक्तैः"
    parts: ["rāga (attraction, from rañj — to color)", "dveṣa (aversion, from dviṣ — to hate)", "vi (free from)", "yukta (joined, from yuj)"]
    meaning: "free from attraction and aversion"
  - word: "विषयान्"
    parts: ["vi (apart)", "ṣi (to bind)"]
    meaning: "sense objects"
  - word: "इन्द्रियैः"
    parts: ["indriya (sense organ)"]
    meaning: "with the senses, through the senses"
  - word: "चरन्"
    parts: ["car (to move, to walk)"]
    meaning: "moving among, engaging with"
  - word: "आत्मवश्यैः"
    parts: ["ātma (self)", "vaśya (under control, from vaś)"]
    meaning: "with self-controlled senses"
  - word: "प्रसादम्"
    parts: ["pra (forth)", "sad (to sit, to settle)"]
    meaning: "serenity, clarity, grace, inner peace"
  - word: "अधिगच्छति"
    parts: ["adhi (over, upon)", "gam (to go)"]
    meaning: "attains, reaches, arrives at"

meaning: >
  But the self-controlled, moving among sense objects with senses free from
  attraction and aversion — such a one attains serenity.

story:
  title: "Baa at the Bazaar"
  source: "original"
  body: |
    Every second Saturday, Baa walked to the weekly bazaar in the
    neighboring village. It was a forty-minute walk along the canal road,
    through fields of soybean and wheat, past the temple with the broken
    gate, and into the loud, bright tangle of the market.

    Nandu loved going with her. The bazaar was a universe compressed into
    two streets — vegetable sellers shouting from behind pyramids of
    tomatoes, cloth merchants unfurling bolts of silk, a sweet shop where
    jalebis sizzled in a vat of oil so large Nandu could have bathed in
    it, the hot sugar smell mixing with dust and the perfume of jasmine
    garlands piled on a brass tray.

    Kabir, when he came along, was like a pinball machine. He ricocheted
    from stall to stall, eyes wide, fingers grabbing — "Look at this
    cricket bat! Feel this fabric! Can we get kulfi? Just one stick?
    Please?" He wanted everything. And when he could not have everything,
    he sulked, dragging his feet, kicking stones.

    Baa moved through the same bazaar as though she were walking through
    a garden. She saw the silks — Nandu noticed her eyes linger on a
    deep green fabric with gold threadwork, the kind that would look
    beautiful on her — but she did not stop. She smelled the jalebis and
    smiled, a genuine smile of appreciation, but she did not turn toward
    the stall. She paused at the flower seller and inhaled deeply, her
    eyes closing for a moment, taking in the jasmine and the marigold
    and the fresh cut roses, and then she opened her eyes and walked on.

    She was not blind. That was the thing Nandu realized, watching her.
    She was not pretending the beautiful things were not beautiful or the
    delicious things were not delicious. She saw them clearly, maybe more
    clearly than Kabir did, because Kabir's wanting got in the way of his
    seeing — he was so busy grabbing that he never really looked.

    Baa looked. She appreciated. And then she let go. Not with effort,
    not with a clenched jaw and a muttered "I don't need that." She let
    go the way you let go of a breath — naturally, easily, because
    another breath is always coming.

    She bought exactly what she came for: turmeric, mustard oil, a kilo
    of rice, and a small bag of jaggery for Nandu's sweet tooth. She
    paid, tucked the bags into her cloth jhola, and walked back through
    the bazaar as calmly as she had entered.

    On the walk home, Nandu asked her: "Baa, didn't you want that green
    fabric?"

    She thought about it. "It was beautiful," she said. "But wanting it
    and needing it are not the same animal, Nandu. I can love the green
    of it without needing it folded in my cupboard."

    The canal sparkled. The wheat fields bent in the wind. Baa's jhola
    swung gently on her shoulder, light as a promise kept.

reflection: "Can you enjoy looking at something beautiful in a shop without needing to buy it? What is the difference between liking something and needing to own it?"
