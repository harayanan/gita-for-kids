summary: >
  Krishna describes the universe as a great upside-down tree — its roots reach
  up to heaven and its branches spread down into the world. This magical tree
  represents all of life's attachments. A wise person learns to look beyond
  this tree to find the Supreme Self, the source of all light and love.
