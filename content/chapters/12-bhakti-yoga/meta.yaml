name: The Yoga of Devotion
sanskrit_name: भक्तियोग
transliterated_name: Bhakti Yoga
verse_count: 20
folk_art_style: pichwai
summary: >
  Krishna describes the sweetest path of all — devotion, or bhakti. He says
  that those who love him with all their heart are very dear to him. You don't
  need to be the smartest or the strongest. If you are kind, forgiving, and
  full of love for others, you are already walking the path of bhakti.
