- term: dharma
  sanskrit: धर्म
  definition: The right way to live — your duty, righteousness, and the natural order of things.

- term: karma
  sanskrit: कर्म
  definition: Action, and the results that come from your actions. Every deed has a consequence.

- term: yoga
  sanskrit: योग
  definition: A way of connecting with something greater. It can mean discipline, union, or a spiritual path.

- term: atman
  sanskrit: आत्मन्
  definition: Your true self — the soul that lives inside every being, unchanging and eternal.

- term: Brahman
  sanskrit: ब्रह्मन्
  definition: The ultimate reality — the infinite spirit that everything in the universe is part of.

- term: shloka
  sanskrit: श्लोक
  definition: A verse or couplet in Sanskrit poetry. The Gita is written in shlokas.

- term: kshetra
  sanskrit: क्षेत्र
  definition: A field — can mean a battlefield or the body where life's experiences happen.

- term: kuru
  sanskrit: कुरु
  definition: The ancient royal family. Both the Pandavas and Kauravas belong to the Kuru dynasty.

- term: Pandava
  sanskrit: पाण्डव
  definition: The five sons of King Pandu — Yudhishthira, Bhima, Arjuna, Nakula, and Sahadeva. The heroes of the Mahabharata.

- term: Kaurava
  sanskrit: कौरव
  definition: The hundred sons of King Dhritarashtra, led by Duryodhana. Rivals of the Pandavas.

- term: Kurukshetra
  sanskrit: कुरुक्षेत्र
  definition: The sacred battlefield where the great war of the Mahabharata was fought.

- term: Mahabharata
  sanskrit: महाभारत
  definition: One of the two great Indian epics. The Bhagavad Gita is a part of this enormous story.

- term: moksha
  sanskrit: मोक्ष
  definition: Liberation — freedom from the cycle of birth and death. The ultimate spiritual goal.

- term: samsara
  sanskrit: संसार
  definition: The cycle of birth, death, and rebirth that every soul goes through until it reaches moksha.

- term: bhakti
  sanskrit: भक्ति
  definition: Devotion and loving surrender to God. One of the main paths to spiritual freedom.

- term: jnana
  sanskrit: ज्ञान
  definition: Knowledge or wisdom — especially the deep understanding of the true nature of reality.

- term: sankhya
  sanskrit: सांख्य
  definition: A system of philosophy that teaches how to tell apart the real (the soul) from the unreal (the material world).

- term: buddhi
  sanskrit: बुद्धि
  definition: Intelligence — the power of the mind to reason, judge, and understand clearly.

- term: manas
  sanskrit: मनस्
  definition: The mind — the part of you that thinks, feels, worries, and imagines.

- term: ahankara
  sanskrit: अहंकार
  definition: The ego — the feeling of "I" and "mine" that makes you think you are separate from everything else.

- term: guna
  sanskrit: गुण
  definition: A quality or strand of nature. There are three gunas — sattva, rajas, and tamas.

- term: sattva
  sanskrit: सत्त्व
  definition: Goodness, purity, and harmony. The guna that brings clarity, peace, and wisdom.

- term: rajas
  sanskrit: रजस्
  definition: Passion, activity, and restlessness. The guna that drives desire and action.

- term: tamas
  sanskrit: तमस्
  definition: Darkness, laziness, and confusion. The guna that causes ignorance and inaction.

- term: prakriti
  sanskrit: प्रकृति
  definition: Nature — the material world that everything physical is made of, including your body and mind.

- term: purusha
  sanskrit: पुरुष
  definition: The spirit or consciousness — the witness that observes but is not changed by nature.

- term: avatar
  sanskrit: अवतार
  definition: A form that God takes when coming to Earth. Krishna is an avatar of Vishnu.

- term: mantra
  sanskrit: मन्त्र
  definition: Sacred words or sounds that carry spiritual power when chanted or meditated upon.

- term: tapas
  sanskrit: तपस्
  definition: Self-discipline — training yourself through effort, patience, and sometimes giving things up.

- term: sattvik
  sanskrit: सात्त्विक
  definition: Pure and harmonious — food, actions, or thoughts that bring clarity and goodness.

- term: rajasic
  sanskrit: राजसिक
  definition: Passionate and restless — food, actions, or thoughts that stir up desire and agitation.

- term: tamasic
  sanskrit: तामसिक
  definition: Dull and confused — food, actions, or thoughts that lead to laziness and ignorance.

- term: yajna
  sanskrit: यज्ञ
  definition: An offering or sacrifice — sharing what you have with the world as an act of devotion.

- term: acharya
  sanskrit: आचार्य
  definition: A teacher or master — someone who teaches by both words and the example of their life.

- term: guru
  sanskrit: गुरु
  definition: A spiritual teacher who guides you from darkness toward light and understanding.

- term: deva
  sanskrit: देव
  definition: A shining one — a god or divine being in the world of light.

- term: asura
  sanskrit: असुर
  definition: A being driven by ego and desire — the opposite nature of the devas.

- term: rishi
  sanskrit: ऋषि
  definition: A sage or seer — someone who has realized deep spiritual truths through meditation.

- term: vishada
  sanskrit: विषाद
  definition: Deep sorrow, despair, or grief. Chapter 1 is called "Arjuna Vishada Yoga."

- term: samadhi
  sanskrit: समाधि
  definition: A state of deep meditation where the mind becomes completely still and united with the divine.

- term: varna
  sanskrit: वर्ण
  definition: A social group based on one's nature and work — not birth. The Gita describes four varnas.

- term: Sanjaya
  sanskrit: सञ्जय
  definition: Dhritarashtra's charioteer and advisor, blessed with divine sight to see the entire battlefield from far away.

- term: Dhritarashtra
  sanskrit: धृतराष्ट्र
  definition: The blind king of Hastinapura. Father of the hundred Kauravas. He asks Sanjaya to describe the battle.

- term: Duryodhana
  sanskrit: दुर्योधन
  definition: The eldest Kaurava prince. Proud and jealous, he refused to share the kingdom with his Pandava cousins.

- term: Arjuna
  sanskrit: अर्जुन
  definition: The third Pandava brother — the greatest archer in the world. Krishna is his charioteer and guide.

- term: Krishna
  sanskrit: कृष्ण
  definition: An avatar of Lord Vishnu who serves as Arjuna's charioteer. He speaks the teachings of the Gita.

- term: Bhishma
  sanskrit: भीष्म
  definition: The great-grandfather of both Pandavas and Kauravas. Bound by a terrible vow, he fights on the Kaurava side.

- term: Drona
  sanskrit: द्रोण
  definition: Dronacharya — the royal teacher of archery who trained both the Pandavas and Kauravas. Fights for the Kauravas.

- term: Karna
  sanskrit: कर्ण
  definition: A great warrior raised as a charioteer's son, but secretly the eldest son of Kunti. Loyal to Duryodhana.

- term: Abhimanyu
  sanskrit: अभिमन्यु
  definition: Arjuna's brave young son who learned to enter the Chakravyuha battle formation but not how to escape it.

- term: Chakravyuha
  sanskrit: चक्रव्यूह
  definition: A deadly spiral battle formation. Abhimanyu famously broke into one but could not find his way out.

# --- Chapter 3 (Karma Yoga) terms ---

- term: nishkarmya
  sanskrit: नैष्कर्म्य
  definition: Freedom from the bondage of action — not by avoiding work, but by doing it without selfish desire.

- term: akarma
  sanskrit: अकर्म
  definition: Inaction — refusing to act. The Gita teaches that mere avoidance of work does not lead to freedom.

- term: kama
  sanskrit: काम
  definition: Desire or craving — the wanting that makes you reach for more and more, like a fire that is never satisfied.

- term: krodha
  sanskrit: क्रोध
  definition: Anger — the fierce heat that rises when desire is blocked. Krishna calls it the great enemy of wisdom.

- term: raga
  sanskrit: राग
  definition: Attachment — the pull you feel toward things you like. One of the two guards that block clear seeing.

- term: dvesha
  sanskrit: द्वेष
  definition: Aversion — the push away from things you dislike. The opposite of raga, and equally blinding.

- term: indriya
  sanskrit: इन्द्रिय
  definition: A sense organ — eyes, ears, nose, tongue, skin. The five doorways through which the world enters your mind.

- term: lokasangraha
  sanskrit: लोकसंग्रह
  definition: Holding the world together — acting for the welfare of all beings, not just yourself. The true purpose of karma yoga.

- term: sannyasa
  sanskrit: संन्यास
  definition: Renunciation — giving up attachment to actions and their results. A path of letting go.

- term: siddhi
  sanskrit: सिद्धि
  definition: Perfection or accomplishment — the success that comes from dedicated, selfless practice.

- term: swadharma
  sanskrit: स्वधर्म
  definition: Your own duty — the particular role and responsibility that is yours to fulfill, based on your nature.

- term: dehin
  sanskrit: देहिन्
  definition: The embodied one — the soul that lives inside a body, like a person wearing clothes.

# --- Chapter 15 (Purushottama Yoga) terms ---

- term: ashvattha
  sanskrit: अश्वत्थ
  definition: The sacred fig tree (peepal). In Chapter 15, Krishna describes a cosmic upside-down ashvattha whose roots grow upward into heaven.

- term: purushottama
  sanskrit: पुरुषोत्तम
  definition: The Supreme Person — higher than both the perishable world and the imperishable soul. Krishna's ultimate title.

- term: kshara
  sanskrit: क्षर
  definition: The perishable — everything in the world that changes, decays, and passes away.

- term: akshara
  sanskrit: अक्षर
  definition: The imperishable — that which never changes or dies. The eternal witness within every being.

- term: paramatma
  sanskrit: परमात्मा
  definition: The Supreme Self — the great soul that holds all other souls, the way the sky holds all the stars.

- term: vaishvanara
  sanskrit: वैश्वानर
  definition: The universal fire — the divine flame in every belly that digests food. Krishna says "I am the fire in all beings."

- term: dvandva
  sanskrit: द्वन्द्व
  definition: Pairs of opposites — pleasure and pain, heat and cold, gain and loss. The wise person stays steady through them all.

- term: soma
  sanskrit: सोम
  definition: The moon — source of nourishing nectar. Krishna says he becomes the moon to feed the sap of all plants.

- term: vedanta
  sanskrit: वेदान्त
  definition: The end (conclusion) of the Vedas — the Upanishads, which contain the deepest teachings about the self and reality.

- term: chandas
  sanskrit: छन्दस्
  definition: Vedic hymns — the sacred verses and metres in which ancient wisdom is preserved and chanted.

- term: atman
  sanskrit: आत्मन्
  definition: The individual soul — the real you that lives inside the body. It cannot be cut, burned, or destroyed.

- term: deha
  sanskrit: देह
  definition: The physical body — the "clothing" the soul wears. Bodies change, but the soul inside them does not.

- term: sankhya
  sanskrit: सांख्य
  definition: A way of knowing through wisdom and reasoning — one of the two paths Krishna teaches in Chapter 2.

- term: buddhi
  sanskrit: बुद्धि
  definition: The intellect — the part of your mind that decides and discerns right from wrong.

- term: sthitaprajna
  sanskrit: स्थितप्रज्ञ
  definition: One whose wisdom is steady and unshaken — a person who stays calm no matter what happens.

- term: samatva
  sanskrit: समत्व
  definition: Equanimity — being balanced in success and failure, pleasure and pain. Krishna says this IS yoga.

- term: guna
  sanskrit: गुण
  definition: One of three qualities of nature — sattva (goodness), rajas (passion), tamas (inertia) — that shape everything in the world.

- term: kshatriya
  sanskrit: क्षत्रिय
  definition: A warrior — one whose dharma is to protect people and fight for justice.

- term: rasa
  sanskrit: रस
  definition: Taste or essence — the lingering pull of past pleasures that remains even when the object is gone.

- term: samadhi
  sanskrit: समाधि
  definition: Deep absorption — the state where the mind is perfectly still and focused, like a lamp in a windless place.

- term: nirvana
  sanskrit: निर्वाण
  definition: Liberation — freedom from the cycle of birth and death. The final peace.

- term: prajna
  sanskrit: प्रज्ञा
  definition: Wisdom — deep understanding that comes from seeing things as they truly are, not just knowing facts.

- term: kashmala
  sanskrit: कश्मल
  definition: Weakness or dejection — the faint-heartedness that overcomes Arjuna at the start of Krishna's teaching.
