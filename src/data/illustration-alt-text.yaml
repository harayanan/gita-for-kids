"15-purushottama-yoga/019": "Kalamkari-style painting of Arjuna's eyes filling with tears that are not grief but understanding, as he finally sees Krishna clearly as the Supreme Person and worships with his whole being."
"15-purushottama-yoga/020": "Kalamkari-style painting of Krishna falling silent as the world comes back around them, a single lamp glowing in a dark room — illustrating the most secret teaching that brings wisdom and fulfilment."
