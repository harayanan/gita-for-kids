"03-karma-yoga/030": "Pattachitra-style painting of Krishna's voice and expression changing as he commands Arjuna to surrender every action to him, let go of desire, and fight without grief or ego."
"03-karma-yoga/031": "Pattachitra-style painting of a student's week transforming as she follows Krishna's teaching with genuine faith, illustrating the promise that faithful practice frees one from the chains of karma."
"03-karma-yoga/032": "Pattachitra-style painting of a stubborn prince named Vikrama who rejected wise counsel out of pride, illustrating Krishna's warning that those who refuse this teaching out of envy lose their way."
"03-karma-yoga/033": "Pattachitra-style painting of two friends — Lakshmi and Priya — as different as a river and a mountain, illustrating that even the wise act according to their own nature."
"03-karma-yoga/034": "Pattachitra-style painting of Krishna leaning close and whispering a secret — that two invisible guards, desire and aversion, stand at every sense-door and must be mastered."
"03-karma-yoga/035": "Pattachitra-style painting of a school talent show where a girl chooses to sing her own imperfect song instead of copying someone else's, illustrating that one's own duty done poorly is better than another's done perfectly."
"03-karma-yoga/036": "Pattachitra-style painting of Arjuna asking his most honest question — if doing right is so important, what invisible force pushes people toward wrong even against their will?"
"03-karma-yoga/037": "Pattachitra-style painting of Krishna naming the real enemy — desire and anger — as fierce forces born from restless energy that live inside every person, all-consuming and sinful."
"03-karma-yoga/038": "Pattachitra-style painting of smoke covering a fire, dust covering a mirror, and a membrane covering an embryo — three images showing how desire hides inner wisdom in different degrees."
"03-karma-yoga/039": "Pattachitra-style painting of a young student named Uttanka in the forest of Naimisha, facing a fire of desire that can never be satisfied no matter how much fuel is added."
"03-karma-yoga/040": "Pattachitra-style painting of Krishna leaning forward with military precision, describing the three strongholds where desire hides — in the senses, the mind, and the intellect."
"03-karma-yoga/041": "Pattachitra-style painting of a boy named Aarav pausing before grabbing a scuffed red cricket ball, illustrating Krishna's command to start by controlling the senses, the outermost gate."
"03-karma-yoga/042": "Pattachitra-style painting of Krishna drawing a ladder of light in the dust of the chariot floor — senses, mind, intellect, and above all, the soul — revealing the inner hierarchy of power."
"03-karma-yoga/043": "Pattachitra-style painting of the wind dying on the battlefield as Krishna speaks the last words of Karma Yoga — anchoring the mind in the highest self and conquering the enemy of desire."

# Chapter 12: Bhakti Yoga (Pichwai style, 20 verses)
"12-bhakti-yoga/001": "Pichwai-style painting of the wind finally stopping on the battlefield as Arjuna asks Krishna the simplest question — which is better, worshipping God with a form or without?"
"12-bhakti-yoga/002": "Pichwai-style painting of a young girl named Neha contemplating two ways to pray, illustrating Krishna's answer that those who worship with unwavering devotion and supreme faith are the best among yogis."
"12-bhakti-yoga/003": "Pichwai-style painting of seven rishis sitting around a sacred fire deep in the Naimisha forest, worshipping the formless and imperishable, like music drifting from a room you cannot find."
"12-bhakti-yoga/004": "Pichwai-style painting of a girl named Ira staring at her paint box, trying to paint the wind, illustrating the challenge of worshipping a God with no form, colour, or shape."
"12-bhakti-yoga/005": "Pichwai-style painting of a boy sitting under a banyan tree for six days trying to reach the formless divine, illustrating Krishna's gentle warning that the path of the formless is much harder for beings in bodies."
"12-bhakti-yoga/006": "Pichwai-style painting of a boy named Ravi unable to sleep, lighting a small lamp before dawn and surrendering his actions to God, illustrating single-minded devotion as the way to worship."
"12-bhakti-yoga/007": "Pichwai-style painting of Draupadi at the Kaurava court as her sari miraculously extends without end, illustrating Krishna's promise to swiftly rescue those whose hearts are set on him from the ocean of suffering."
"12-bhakti-yoga/008": "Pichwai-style painting of an old harmonium with worn keys being played with devoted attention, illustrating Krishna's instruction to fix the mind on him alone and let understanding rest in him."
"12-bhakti-yoga/009": "Pichwai-style painting of the young child Dhruva standing on one foot in determined meditation, illustrating Krishna's advice that those who cannot focus perfectly should practise steadily."
"12-bhakti-yoga/010": "Pichwai-style painting of a grandmother with aching knees preparing food offerings in her kitchen as her daily worship, illustrating Krishna's teaching that simply dedicating your everyday work to God leads to perfection."
"12-bhakti-yoga/011": "Pichwai-style painting of the sun setting behind the western ridge of Kurukshetra in turmeric and ash colours, as Krishna offers the simplest step — just let go of attachment to results."
"12-bhakti-yoga/012": "Pichwai-style painting of a boy at the cricket crease calmly playing each ball as it comes without watching the scoreboard, illustrating that giving up attachment to results brings immediate peace."
"12-bhakti-yoga/013": "Pichwai-style painting of Hanuman landing silently in the Ashoka grove, radiating compassion and strength, illustrating Krishna's description of the devotee with no hatred, who is friendly to all beings."
"12-bhakti-yoga/014": "Pichwai-style painting of a girl named Meera arriving at a new school wearing a bindi, always content and steady, illustrating the devotee who is self-controlled, firm in resolve, and has offered mind and heart to God."
"12-bhakti-yoga/015": "Pichwai-style painting of dice clattering across the polished floor of the Kaurava court as Vidura walks out in protest, illustrating the one who neither disturbs the world nor is disturbed by it."
"12-bhakti-yoga/016": "Pichwai-style painting of a serene man sitting by the river at the Varanasi ghats at dawn, free from wants and pure in heart, illustrating the devotee who has given up all selfish undertakings."
"12-bhakti-yoga/017": "Pichwai-style painting of the boy Prahlada sitting calmly in flames that cannot touch him, illustrating the devotee who neither rejoices wildly nor grieves, letting go of both good and bad fortune."
"12-bhakti-yoga/018": "Pichwai-style painting of a boy sitting peacefully on the cricket boundary after a match, equal toward friend and opponent, illustrating the devotee who is the same in honour and dishonour."
"12-bhakti-yoga/019": "Pichwai-style painting of Sudama walking the long road to Dwaraka carrying a humble gift of beaten rice for Krishna, illustrating the devotee who is content with whatever comes and not attached to any home."
"12-bhakti-yoga/020": "Pichwai-style painting of a peepal tree behind a grandmother's house with the distant sound of a flute, illustrating Krishna's final promise that those who follow this dharma with full faith are the dearest of all."

# Chapter 15: Purushottama Yoga (Kalamkari style, 20 verses)
"15-purushottama-yoga/001": "Kalamkari-style painting of a vast upside-down cosmic tree with roots reaching into heaven and branches spreading downward, surrounded by the scent of sandalwood smoke as Krishna begins his teaching."
"15-purushottama-yoga/002": "Kalamkari-style painting of the great cosmic tree breathing and growing, its branches stretching in all directions, fed by the three gunas, with buds of sense-pleasure blooming everywhere."
"15-purushottama-yoga/003": "Kalamkari-style painting of a young seeker finding the wandering sage Narada after seven years of searching, receiving the axe of detachment to cut through the cosmic tree of attachment."
"15-purushottama-yoga/004": "Kalamkari-style painting of the cosmic tree falling without a sound, revealing a clearing of brilliant light beyond — the supreme place from which no one returns to the cycle of birth and death."
"15-purushottama-yoga/005": "Kalamkari-style painting of a house smelling of cardboard and old rose water as a grandmother's belongings are packed away, illustrating freedom from pride, confusion, and attachment."
"15-purushottama-yoga/006": "Kalamkari-style painting of a radiant light shining without any sun, moon, or lamp, illuminating itself from within — illustrating Krishna's supreme abode that needs no external light."
"15-purushottama-yoga/007": "Kalamkari-style painting of a girl named Meera finding a mirror shard in the garden mud that reflects the entire sky, illustrating how every living being is an eternal fragment of Krishna."
"15-purushottama-yoga/008": "Kalamkari-style painting of an invisible wind carrying the fragrance of jasmine through a garden, illustrating how the soul carries the mind and senses from one body to the next."
"15-purushottama-yoga/009": "Kalamkari-style painting of a colourful mela before Holi with sights, sounds, and smells pouring through every sense, illustrating the six windows — five senses and mind — through which the soul experiences the world."
"15-purushottama-yoga/010": "Kalamkari-style painting of two sages sitting by a river at the moment between night and morning, debating — one sees the soul departing a body while the other cannot, illustrating the eye of knowledge."
"15-purushottama-yoga/011": "Kalamkari-style painting of a quiet morning when the river goes still, illustrating how yogis who purify their minds can see the soul shining within, while the undisciplined cannot."
"15-purushottama-yoga/012": "Kalamkari-style painting of three lights in a single day — the brilliant sun, the soft moon, and the dancing fire — all revealed as coming from Krishna's own radiance."
"15-purushottama-yoga/013": "Kalamkari-style painting of a grandmother and granddaughter kneeling in a garden watching a tiny shoot push through the soil, illustrating how Krishna enters the earth and nourishes every plant."
"15-purushottama-yoga/014": "Kalamkari-style painting of a kitchen filled with the smell of tamarind and roasting cumin, illustrating Krishna as the sacred digestive fire burning inside every creature's body."
"15-purushottama-yoga/015": "Kalamkari-style painting of the battlefield falling quiet between one teaching and the next, as Krishna reveals he sits in the heart of every being, the source of memory, knowledge, and even forgetfulness."
"15-purushottama-yoga/016": "Kalamkari-style painting of Krishna drawing two circles in the dust before sunrise, illustrating the two kinds of beings — the perishable body that changes and the imperishable soul that watches."
"15-purushottama-yoga/017": "Kalamkari-style painting of the battlefield falling into a different kind of silence as Krishna reveals the Supreme Person — Paramatma — who enters all three worlds and sustains them like a lamp lighting every room."
